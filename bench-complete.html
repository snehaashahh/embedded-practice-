<style>
:root{
  --bg:#0a0d10; --panel:#12161b; --panel-2:#161b21; --border:#232a32; --border-soft:#1a2026;

  --cyan:#5eead4; --amber:#ffb454; --pink:#ff7ab6; --violet:#a78bfa; --red:#ff6b6b;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(94,234,212,0.06), transparent 60%),

}
.mono{font-family:'JetBrains Mono', monospace;}
a{color:var(--cyan);}

.app{ display:flex; min-height:100vh; }

.brand .eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; color:var(--cyan); text-transform:uppercase; display:flex; align-items:center; gap:7px;}
.brand .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--cyan); box-shadow:0 0 6px var(--cyan); animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.brand h1{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:25px; margin:8px 0 4px; letter-spacing:-0.01em;}
.brand p{font-size:12px; color:var(--text-mute); margin:0; line-height:1.5;}
.progress-mini{ padding:14px 22px; border-bottom:1px solid var(--border); margin-bottom:6px;}
.progress-mini .label{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; color:var(--text-mute); text-transform:uppercase; margin-bottom:6px; display:flex; justify-content:space-between;}

.unit{ margin-top:4px; }
.unit-head{
  padding:12px 22px 6px; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.1em;

}
.unit-head:hover{ color:var(--text-dim); }

.lesson-list{ overflow:hidden; }

.lesson-item{
  display:flex; align-items:center; gap:10px; padding:8px 22px 8px 28px; cursor:pointer;

}
.lesson-item:hover{ background:rgba(255,255,255,0.02); color:var(--text); }
.lesson-item.active{ border-left-color:var(--cyan); background:rgba(94,234,212,0.06); color:var(--text); }
.lesson-check{ width:13px; height:13px; border-radius:50%; border:1.5px solid var(--text-mute); flex-shrink:0; position:relative; }

.main{ flex:1; min-width:0; }

.crumb span{ color:var(--amber); }
h2.lesson-title{ font-family:'JetBrains Mono',monospace; font-size:clamp(24px,4vw,32px); font-weight:700; letter-spacing:-0.01em; margin:0 0 22px; line-height:1.18; }
.lesson-body p{ font-size:16px; line-height:1.75; color:var(--text-dim); margin:0 0 18px; }
.lesson-body strong{ color:var(--text); font-weight:600; }
.lesson-body h4{ font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.05em; color:var(--amber); text-transform:uppercase; margin:26px 0 10px; }
.lesson-body ul, .lesson-body ol{ font-size:16px; line-height:1.75; color:var(--text-dim); padding-left:22px; margin:0 0 18px;}
.lesson-body li{ margin-bottom:8px; }
.lesson-body table{ width:100%; border-collapse:collapse; font-size:13.5px; margin:18px 0; }
.lesson-body table td{ padding:8px 6px; border-bottom:1px solid var(--border-soft); color:var(--text-dim); }
.lesson-body table tr:first-child td{ font-family:'JetBrains Mono',monospace; color:var(--text-mute); font-size:11px; border-bottom:1px solid var(--border); }
.callout{
  border:1px solid var(--border); border-left:3px solid var(--cyan); background:var(--panel); border-radius:6px;

.callout .callout-label{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; color:var(--cyan); text-transform:uppercase; margin-bottom:6px; }
.callout.warn{ border-left-color:var(--amber); } .callout.warn .callout-label{ color:var(--amber); }
.callout.danger{ border-left-color:var(--red); } .callout.danger .callout-label{ color:var(--red); }
.callout.violet{ border-left-color:var(--violet); } .callout.violet .callout-label{ color:var(--violet); }

.widget{ margin:26px 0; border:1px solid var(--border); border-radius:8px; background:var(--panel); overflow:hidden; }
.widget-head{ padding:10px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;
  font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.1em; color:var(--text-mute); text-transform:uppercase; }
.widget-head .live{ color:var(--cyan); display:flex; align-items:center; gap:5px; }
.widget-head .live .dot{ width:5px;height:5px;border-radius:50%; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }

.nav-footer{ display:flex; justify-content:space-between; align-items:center; margin-top:40px; padding-top:24px; border-top:1px solid var(--border); gap:12px; }

.btn{ font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:5px; cursor:pointer; transition:all .15s ease; }
.btn:hover{ border-color:var(--cyan); color:var(--cyan); }

.qcard summary::-webkit-details-marker{ display:none; }

.exblock{ border:1px solid var(--border); border-left:3px solid var(--amber); background:var(--panel); border-radius:6px; padding:16px 18px 4px; margin:22px 0; }

const UNITS = [
{ id:'u0', title:'Unit 0 — Start Here', lessons:[
  { id:'0-1', title:'How This Course Works, and Your Free Resource Stack', body:`
    <p>You said you want to go from zero to "ace a job" — that's a real goal, and it's reachable, but it's also a multi-month project, not a weekend. This page is the map. Read it once before you touch Unit 1.</p>
    <h4>How the course is structured</h4>
    <ul>
      <li><strong>Units 1–9</strong> are the concept spine — binary and C through registers, peripherals, protocols, concurrency, memory, reliability, and tooling. Each lesson has a short reading, sometimes a live in-browser simulator, and most units end with a self-graded quiz.</li>
      <li><strong>Unit 10 — Projects</strong> is where the concepts become muscle memory. You can't actually learn firmware by reading about it any more than you can learn to swim by reading about water. Each project lists real (cheap) hardware plus a free simulator fallback if you don't have a board yet.</li>
      <li><strong>Unit 11 — Interview Prep &amp; Career</strong> is what to do once Units 1–10 are solid: the question bank, system design scenarios, and how to talk about the projects you built.</li>
    </ul>
    <p>Inside lessons, look for two recurring boxes: an amber <strong>"try it yourself"</strong> box is a short exercise with a hidden solution you can reveal after attempting it — don't reveal first, that's the whole value of it. A <strong>quiz</strong> at the end of a unit is multiple choice, self-graded, instant feedback.</p>
    <h4>Mapping your five resources onto this course</h4>
    <p>You gathered five real resources before this. They're good ones, and they're not redundant with each other — each is strongest at a different layer. Here's how to actually use them instead of bouncing between tabs:</p>
    <div class="res-card">
      <div class="res-title">Valvano — Embedded Systems, Vol. 1 (UT Austin e-book)</div>
      <p>This is the single best free deep-dive on ARM Cortex-M fundamentals available anywhere — written by the professor who has taught this exact subject for decades. Treat it as your <strong>reference textbook</strong> alongside Units 1–6 here: when a lesson here gives you the concept in two paragraphs and you want the full derivation, the matching Valvano chapter has it. Don't read it cover to cover in order; jump to the chapter matching whatever unit you're on.</p>
    </div>
    <div class="res-card">
      <div class="res-title">Arm EducationX — Embedded Systems Essentials (edX)</div>
      <p>A structured, project-based course built around the inexpensive ST Nucleo-F401RE board (and a free in-browser Mbed simulator before you buy hardware). Its two parts map almost one-to-one onto this course: Part 1 (digital/analog I/O, interrupts, timers, PWM) lines up with Units 2–5 here; Part 2 (RTOS and serial communication on real Cortex-M hardware) lines up with Units 4 and 6. <strong>Do this alongside Unit 10's projects</strong> — its labs are effectively done-for-you versions of the same exercises with a guided board.</p>
    </div>
    <div class="res-card">
      <div class="res-title">YouTube — "Intro to Embedded Systems Design" (MSP430FR2355 textbook series)</div>
      <p>This is the companion video series to Brock LaMeres's MSP430FR2355 textbook — a second full university-level treatment, just on TI's MSP430 instead of an ARM Cortex-M. Differences in instruction set aside, the underlying concepts (memory-mapped I/O, interrupts, timers, ADC) are identical to Units 2, 3, and 5 here. <strong>Use it as a second explanation</strong> of any concept that didn't click the first time — sometimes a different chip and a different professor is exactly what makes something land.</p>
    </div>
    <div class="res-card">
      <div class="res-title">Udemy — "Become an Embedded Systems Engineer: 30 Days Challenge"</div>
      <p>A fast-paced, project-driven course built for exactly the "I know nothing, get me job-ready" goal you described. Its pace (one focused build per day) is a good model for how to run Unit 10 here: don't spend three weeks "preparing" to build something — build something small today, even if it's wrong, and fix it tomorrow.</p>
    </div>
    <div class="res-card">
      <div class="res-title">C++ video course</div>
      <p>General-purpose C++ is not the same skill as embedded C, but solid fundamentals (pointers, structs, memory, compilation) transfer directly into Unit 1.4 here. If your C/C++ is shaky, watching the early chapters of a fundamentals course like this before Unit 1 will make everything downstream faster — but don't let general-purpose C++ become a detour from the embedded-specific material; most production firmware is still written in C, or a deliberately restricted subset of C++.</p>
    </div>
    <h4>A realistic week-by-week plan (roughly 14 weeks, ~8–10 hrs/week)</h4>
    <table class="roadmap-table"><tr><td>Weeks</td><td>Focus</td><td>What "done" looks like</td></tr>
      <tr><td>1–2</td><td>Units 1–2 (Foundations, the Microcontroller)</td><td>You can explain bits/hex/two's complement and memory-mapped I/O without looking it up, and you've set up a real toolchain (Project 0).</td></tr>
      <tr><td>3–4</td><td>Units 3 (Control Flow) + Project 1–2</td><td>You've built a register-level GPIO blink and an interrupt-driven debounced button from scratch.</td></tr>
      <tr><td>5–6</td><td>Unit 4 (Protocols) + Project 3</td><td>You can explain UART vs SPI vs I²C vs CAN trade-offs cold, and you've written a UART command shell.</td></tr>
      <tr><td>7–8</td><td>Unit 5 (Analog) + Project 4</td><td>You understand sampling/aliasing/PWM, and you've built a PWM-driven brightness or motor controller.</td></tr>
      <tr><td>9–10</td><td>Unit 6 (RTOS) + Project 6</td><td>You've ported a bare-metal project onto FreeRTOS with queues between tasks.</td></tr>
      <tr><td>11</td><td>Units 7–8 (Memory, Reliability)</td><td>You can describe a bootloader/OTA flow and name three defensive-firmware patterns.</td></tr>
      <tr><td>12</td><td>Unit 9 + Project 5 or 7</td><td>Your project repos have real READMEs, clean commit history, and at least one documented bug you found and fixed.</td></tr>
      <tr><td>13</td><td>Project 8 (Capstone)</td><td>One project that fuses three+ concepts — your portfolio centerpiece.</td></tr>
      <tr><td>14</td><td>Unit 11 (Interview Prep)</td><td>You can answer the full question bank and walk through your capstone project's design decisions out loud.</td></tr>
    </table>
    <div class="callout violet"><div class="callout-label">One honest note</div>You do not strictly need to buy hardware to get most of the value here — every Unit 10 project lists a free simulator path (Wokwi, Renode, or the Mbed simulator from the Arm course). But if your budget allows roughly $15–30, a board like an STM32 "Blue Pill"/Nucleo or an Arduino Uno will make the last 20% — real timing quirks, real noise, real debugging — click in a way no simulator fully replicates. That last 20% is disproportionately what gets asked about in interviews.</div>
  `},

{ id:'u1', title:'Unit 1 — Foundations', lessons:[
  { id:'1-1', title:'What Makes a System "Embedded"', body:`
    <p>A general-purpose computer — the laptop you're reading this on — runs many programs, switches between them, and is built so a stranger can install anything on it. An <strong>embedded system</strong> is the opposite philosophy: a computer built to do one job, wired permanently into a larger machine, and usually invisible to the person using that machine. The microcontroller inside an exoskeleton's motor driver, a car's anti-lock brake module, a thermostat, and an insulin pump are all embedded systems. So is the chip in your keyboard, your car key fob, and the battery management system charging your phone.</p>
    <p>Four constraints show up again and again and explain almost every design decision in this field:</p>
    <ul>
      <li><strong>Resource-constrained.</strong> Kilobytes of RAM, not gigabytes. A few hundred KB of flash, not a solid-state drive. Every byte and every clock cycle is a design decision, not an afterthought.</li>
      <li><strong>Real-time.</strong> A late answer can be as wrong as no answer. If a motor controller's loop is supposed to run every 1 millisecond and runs late, the motor doesn't get "approximately correct" current — it can lose control entirely.</li>
      <li><strong>Dedicated function, long lifetime.</strong> The code that ships is often the code that runs for the next ten years, sometimes with no remote-patch path. Bugs are expensive in a way a web app's bugs are not.</li>
      <li><strong>Hardware-adjacent.</strong> Software here isn't abstracted away from physics. You're reading voltages, driving currents, and reasoning about timing measured in microseconds.</li>
    </ul>
    <h4>Where the jobs actually are</h4>
    <p>"Embedded engineer" is a wide umbrella. In practice the role splits along a spectrum: <strong>firmware engineers</strong> write the C/C++ that runs directly on the chip (drivers, control loops, protocol stacks); <strong>embedded Linux engineers</strong> work one layer up, on devices powerful enough to run an OS (think a robot's onboard computer, not its motor controller); <strong>hardware/firmware bring-up engineers</strong> specialize in the messy first weeks of a new board, where nothing works yet and you don't know if it's the schematic, the solder joint, or the code; and <strong>validation/test engineers</strong> build the rigs and scripts that prove a design actually meets spec across temperature, voltage, and time. Job postings rarely use these exact labels, so read the listed responsibilities, not just the title.</p>
    <div class="callout"><div class="callout-label">Mental model</div>An embedded system is a feedback loop wearing a microcontroller as a brain: <strong>sense → decide → actuate</strong>, repeated forever, under a deadline. Nearly every system you'll build is some variation of that loop.</div>
  `},
  { id:'1-2', title:'Binary, Hex, Two\u2019s Complement & Why Registers Speak Hex', body:`
    <p>A microcontroller only knows two voltage levels — roughly 0V and 3.3V (or 5V on older parts) — labeled <strong>0</strong> and <strong>1</strong>. Every number, instruction, and piece of text inside the chip is ultimately a sequence of these bits. <strong>Binary</strong> is how a computer thinks; <strong>hexadecimal</strong> is how humans read binary without losing their minds.</p>
    <p>Hex works because 16 = 2⁴: every hex digit maps cleanly onto exactly 4 bits, so an 8-bit byte is always exactly 2 hex digits and a 32-bit register is always exactly 8 hex digits. That's the entire reason datasheets write <code>0x2A</code> instead of <code>00101010</code> — same information, compressed to something readable at a glance.</p>
    <pre><span class="cm">// the same value, three ways</span>
<span class="ty">uint8_t</span> value = 42;        <span class="cm">// decimal</span>
<span class="ty">uint8_t</span> value = 0b00101010; <span class="cm">// binary</span>
<span class="ty">uint8_t</span> value = 0x2A;        <span class="cm">// hex — same 42</span></pre>
    <h4>Signed numbers: two's complement</h4>
    <p>Unsigned types treat all bits as magnitude. Signed types (<code>int8_t</code>, <code>int16_t</code>...) need a way to represent negative numbers using the same bit patterns, and virtually every processor uses <strong>two's complement</strong>: to negate a number, flip every bit, then add 1. The top bit acts as a sign indicator, but it isn't just a "minus flag" sitting on top of the magnitude — that's the cleverness of the scheme. It makes addition and subtraction work with the exact same hardware circuit regardless of sign, with no special cases.</p>
    <pre><span class="ty">int8_t</span> x = 5;          <span class="cm">// 0000 0101</span>
<span class="cm">// negate: flip bits -> 1111 1010, add 1 -> 1111 1011</span>
<span class="ty">int8_t</span> y = -5;         <span class="cm">// 1111 1011</span></pre>
    <p>This is also why an <code>int8_t</code> ranges from -128 to 127, not -127 to 127 — the asymmetry comes from 0 only having one representation, leaving one extra slot on the negative side.</p>
    <h4>Fixed-point: doing "decimal" math without a float</h4>
    <p>Many small MCUs have no hardware floating-point unit, and software-emulated float math is slow enough to blow a real-time deadline. The common workaround is <strong>fixed-point</strong>: store a scaled integer and remember the scale factor yourself. A "Q8" format multiplies every real value by 256 before storing it as an integer, giving you 8 bits of fractional precision using nothing but integer instructions:</p>
    <pre><span class="ty">int32_t</span> q8_value = (<span class="ty">int32_t</span>)(3.75 * 256);  <span class="cm">// store 3.75 as 960</span>
<span class="cm">// to use it later: real_value = q8_value / 256.0</span></pre>
    <p>You'll see this constantly in DSP-adjacent firmware — sensor filters, control loops — anywhere float math would be too slow or the part has no FPU.</p>
  `, widget:'bitConverter8' },
  { id:'1-3', title:'Digital Logic Essentials', body:`
    <p>Underneath every line of firmware is digital logic — gates built from transistors that combine bits by fixed rules. You don't design gates from scratch to write firmware, but you do read and write the bitwise operators that <em>are</em> those gates in software, because register manipulation is built entirely out of them.</p>
    <table><tr><td>Gate</td><td>C operator</td><td>Rule</td><td>Typical firmware use</td></tr>
      <tr><td style="color:var(--cyan);">AND</td><td><code>&amp;</code></td><td>1 only if both bits are 1</td><td>Masking — isolate specific bits</td></tr>
      <tr><td style="color:var(--cyan);">OR</td><td><code>|</code></td><td>1 if either bit is 1</td><td>Setting bits without disturbing others</td></tr>
      <tr><td style="color:var(--cyan);">XOR</td><td><code>^</code></td><td>1 if bits differ</td><td>Toggling a bit (e.g. blink an LED)</td></tr>
      <tr><td style="color:var(--cyan);">NOT</td><td><code>~</code></td><td>Flips every bit</td><td>Building a "clear" mask</td></tr>
      <tr><td style="color:var(--cyan);">SHIFT</td><td><code>&lt;&lt; &gt;&gt;</code></td><td>Slides bits left/right</td><td>Pointing a 1 at exactly one pin</td></tr></table>
    <p>The pattern you'll type hundreds of times in firmware is <strong>set a single bit without touching its neighbors</strong>:</p>
    <pre>REG |=  (1 &lt;&lt; 3);   <span class="cm">// set bit 3, leave the rest alone</span>
REG &amp;= ~(1 &lt;&lt; 3);   <span class="cm">// clear bit 3, leave the rest alone</span>
REG ^=  (1 &lt;&lt; 3);   <span class="cm">// toggle bit 3</span>
<span class="kw">if</span> (REG &amp;  (1 &lt;&lt; 3)) { ... } <span class="cm">// read bit 3</span></pre>
    <h4>Sequential logic: where memory comes from</h4>
    <p>Gates alone are <strong>combinational</strong> — output depends only on the current inputs, with no memory. A <strong>flip-flop</strong> adds memory: it samples its input on a clock edge and holds that value steady until the next edge. Chain enough flip-flops together and you get registers, counters, and ultimately the whole synchronous design discipline that lets a chip's behavior be predictable: "everything updates together, exactly once, on each clock tick."</p>
    <h4>Pull-up and pull-down resistors</h4>
    <p>An input pin that isn't actively driven high or low doesn't sit at a clean 0 or 1 — it <strong>floats</strong>, picking up noise from nearby wires and reading randomly. A <strong>pull-up resistor</strong> weakly ties the pin to the supply voltage so it reads HIGH by default, until something actively pulls it LOW (a classic pattern for buttons: pin reads HIGH normally, drops to LOW when pressed). A <strong>pull-down</strong> does the reverse. Nearly every GPIO peripheral lets you enable an internal pull-up/down in software so you don't need an external resistor for simple cases.</p>
    <div class="callout warn"><div class="callout-label">Practical gotcha</div>Forgetting a pull resistor on an unused input pin is a classic source of "ghost" behavior — a button that seems to randomly trigger, or a state machine that randomly jumps states, because the pin is reading electrical noise as real logic transitions.</div>
  `},
  { id:'1-4', title:'C for Embedded: Pointers, volatile, Structs & Memory Discipline', body:`
    <p>Embedded C is a small, disciplined dialect of the language you may already know. A handful of habits separate it from "regular" application C.</p>
    <h4>Fixed-width types</h4>
    <p>A plain <code>int</code> can be 16 or 32 bits depending on the compiler and chip — fine for a laptop, dangerous when packing exactly 8 bits into a register. Embedded code uses explicit-width types from <code>&lt;stdint.h&gt;</code>:</p>
    <pre><span class="ty">uint8_t</span>  a;  <span class="cm">// unsigned,  8 bits, 0 to 255</span>
<span class="ty">int16_t</span>  b;  <span class="cm">// signed,   16 bits, -32768 to 32767</span>
<span class="ty">uint32_t</span> c;  <span class="cm">// unsigned, 32 bits — the width of most MCU registers</span></pre>
    <h4>Pointers as addresses you choose</h4>
    <p>In application code, a pointer usually points at memory the OS handed you. In firmware, you often write the address yourself — because the datasheet told you a peripheral lives at exactly that address:</p>
    <pre><span class="ty">uint32_t</span> *gpio_odr = (<span class="ty">uint32_t</span> *)0x40020014;
*gpio_odr = 0x01;  <span class="cm">// write directly into hardware</span></pre>
    <h4>volatile</h4>
    <p>A compiler assumes a variable never changes unless your code changes it, and will optimize away a "redundant" read. A peripheral register can change underneath you — a UART status bit flips because a byte arrived, not because your code wrote it. <code>volatile</code> tells the compiler "don't assume, re-read this every time":</p>
    <pre><span class="kw">volatile</span> <span class="ty">uint32_t</span> *status_reg = (<span class="ty">uint32_t</span> *)0x40013800;
<span class="kw">while</span> ((*status_reg &amp; 0x40) == 0) { } <span class="cm">// without volatile this can become an infinite hang once optimized</span></pre>
    <h4>Structs, unions, and bitfields for register maps</h4>
    <p>Real firmware almost never writes raw addresses by hand. Vendor headers define a <code>struct</code> per peripheral, laid out in memory to match the hardware exactly, so you can write <code>GPIOA-&gt;ODR = 0x01;</code> instead of a magic number:</p>
    <pre><span class="kw">typedef struct</span> {
  <span class="kw">volatile</span> <span class="ty">uint32_t</span> MODER;
  <span class="kw">volatile</span> <span class="ty">uint32_t</span> OTYPER;
  <span class="kw">volatile</span> <span class="ty">uint32_t</span> ODR;
  <span class="kw">volatile</span> <span class="ty">uint32_t</span> IDR;
} GPIO_TypeDef;

<span class="cm">// point this struct directly at the peripheral's base address</span>
<span class="cm">#define</span> GPIOA ((GPIO_TypeDef *)0x40020000)
GPIOA-&gt;ODR |= (1 &lt;&lt; 5);  <span class="cm">// reads exactly like the bitwise idiom from Lesson 1.3</span></pre>
    <p><strong>Bitfields</strong> (<code>unsigned x : 3;</code> inside a struct) let you name individual bit groups, but are best avoided for register access in production code — the C standard doesn't guarantee bit ordering or padding across compilers, so two toolchains can lay the same struct out differently. Explicit masks and shifts are slower to write but portable and unambiguous; most production codebases prefer them for exactly this reason.</p>
    <h4>const, static, and avoiding the heap</h4>
    <p><code>const</code> on a pointer parameter is a contract — "this function won't modify what you pointed me at" — and costs nothing at runtime, so use it liberally; it documents intent and lets the compiler catch mistakes. <code>static</code> on a function or file-scope variable restricts its visibility to that one file, the embedded equivalent of "private," and keeps your global namespace from turning into a junk drawer as a project grows.</p>
    <p>Dynamic memory (<code>malloc</code>/<code>free</code>) is used sparingly or banned outright in much embedded code, for two compounding reasons: a failed allocation on a system with kilobytes of RAM is a real, frequent possibility (not a theoretical edge case), and repeated alloc/free cycles can <strong>fragment</strong> a small heap until a large-enough contiguous block simply can't be found anymore — a failure mode that can take hours of uptime to surface, which makes it brutal to debug. The common alternative is **static allocation**: declare buffers and structures up front, sized for the worst case, and never call malloc at all.</p>
    <div class="callout warn"><div class="callout-label">Common bug</div>Forgetting <code>volatile</code> on a hardware register is one of the most common "it works in debug, hangs in release" bugs in embedded software, because optimizers get far more aggressive once optimization is turned on.</div>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A peripheral's status register lives at address <code>0x40013800</code>. Bit 7 is set to 1 by hardware when new data has arrived, and is cleared automatically when you read the data register. Write the C declaration for a pointer to that register, and a <code>while</code> loop that blocks until bit 7 is set. Then explain in one sentence why this code would be a bug without <code>volatile</code>.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer"><pre><span class="kw">volatile</span> <span class="ty">uint32_t</span> *status_reg = (<span class="ty">uint32_t</span> *)0x40013800;
<span class="kw">while</span> ((*status_reg &amp; (1 &lt;&lt; 7)) == 0) { <span class="cm">// spin until bit 7 goes high</span>
}</pre>
        Without <code>volatile</code>, the compiler sees a loop that reads the same address repeatedly without your code ever writing to it, and is free to assume the value never changes — it can legally hoist the read out of the loop entirely and turn this into an infinite loop, because nothing in the C abstract machine tells it the value can change from outside.</div>
      </details>
    </div>
  `},
  { id:'1-5', title:'Computer Architecture, the Stack, and How a Function Call Actually Works', body:`
    <p>Knowing what happens underneath a function call is what separates "I can write C" from "I can debug a crash with no debugger attached." Two architecture concepts make that possible.</p>
    <h4>Von Neumann vs. Harvard architecture</h4>
    <p>A <strong>von Neumann</strong> machine stores program instructions and data in the same memory space, accessed over the same bus. A <strong>Harvard</strong> architecture keeps them physically separate, with separate buses — which is why a Harvard-style core can fetch the next instruction and read/write data in the same clock cycle, a real performance win. Most modern microcontrollers (ARM Cortex-M included) are technically a hybrid: Harvard-like internally for performance, but presenting something close to a unified address space to software, so you rarely have to think about the distinction day-to-day — except when it explains something odd, like why some chips forbid executing code directly from RAM, or treat self-modifying code as suspicious.</p>
    <h4>Registers, the ALU, and the program counter</h4>
    <p>Inside the core, a handful of <strong>CPU registers</strong> (not to be confused with peripheral registers from Unit 2) hold the values currently being worked on — far faster to access than even the fastest RAM. The <strong>ALU</strong> (Arithmetic Logic Unit) does the actual math and bitwise operations. The <strong>Program Counter (PC)</strong> holds the address of the next instruction to execute, and incrementing it is, at the hardware level, the entire mechanism of "running a program in order" — a branch or function call is nothing more than writing a new value into the PC.</p>
    <h4>The call stack</h4>
    <p>The <strong>stack</strong> is a region of RAM that grows and shrinks as functions are called and return. Calling a function pushes a <strong>stack frame</strong> — typically the return address, the caller's saved registers, and the new function's local variables — onto the stack; returning pops it back off. This is why local variables are described as having "automatic storage": they exist only for the duration of the call, allocated and freed by nothing more than moving a stack pointer.</p>
    <pre><span class="ty">void</span> foo() {
  <span class="ty">int</span> local_var = 5;   <span class="cm">// lives on the stack, only while foo() is running</span>
  bar();                  <span class="cm">// pushes a new frame on top for bar()</span>
}  <span class="cm">// foo's frame is popped here — local_var is gone</span></pre>
    <p>On most MCUs, the stack is small and fixed-size — there's no OS to grow it on demand. <strong>Stack overflow</strong> happens when too many nested calls, or one call with a very large local array, push past the space allotted, and the stack pointer wanders into memory it doesn't own — often the heap, or worse, the <code>.data</code>/<code>.bss</code> regions holding your global variables. The symptom is rarely an obvious error: it's usually a global variable silently corrupting itself for no apparent reason, because the stack just grew into it.</p>
    <div class="callout warn"><div class="callout-label">Interview-relevant symptom</div>"A global variable is changing its value with no code that writes to it" is one of the most common embedded bug descriptions, and stack overflow corrupting adjacent memory is one of the first things to suspect — right alongside a missing <code>volatile</code> and an off-by-one array write.</div>
    <h4>Stack vs. heap, one more time</h4>
    <p>The <strong>heap</strong> (when used at all — see Lesson 1.4) is a separate region for dynamically allocated memory that outlives the function that created it, managed explicitly by <code>malloc</code>/<code>free</code> rather than automatically by the call/return mechanism. On a memory-constrained MCU, stack and heap are often configured to grow toward each other from opposite ends of RAM — which is exactly why an under-sized stack and heap fragmentation are both framed as the same underlying risk: running out of RAM in the middle, with nothing to stop one region from colliding into the other.</p>
  `},
  { id:'1-6', title:'Macros & the Preprocessor', body:`
    <p>Before a single line of your C is compiled, it passes through the <strong>preprocessor</strong> — a dumb but powerful text-substitution pass that runs over your source file and acts on anything starting with <code>#</code>.</p>
    <pre><span class="cm">#define</span> MAX_RETRIES 5
<span class="cm">// every later occurrence of MAX_RETRIES is replaced with the literal text "5" before compilation even starts</span></pre>
    <p>The critical thing to internalize: a macro is <strong>copy-paste, not a function call</strong>. The preprocessor has no concept of types, scope, or even valid syntax — it just swaps text. A multi-line macro value needs a trailing backslash at the end of every line except the last, to tell the preprocessor "this definition continues on the next line":</p>
    <pre><span class="cm">#define</span> SETUP_SEQUENCE \\
  init_clock(); \\
  init_gpio(); \\
  init_uart();</pre>
    <h4>Function-like macros</h4>
    <p>Macros can take parameters and look like a function call, but remember: still pure text substitution, with no type checking on the argument at all.</p>
    <pre><span class="cm">#define</span> PRINT_VAR(X) printf("Variable: %d\\n", X)
<span class="cm">// the preprocessor token-pastes the literal name of whatever you pass in — useful for debug macros</span>
<span class="cm">#define</span> PRINT_VAR_NAME(X) printf("Name of the variable: " #X)
<span class="cm">// the # operator turns the argument itself into a string literal, e.g. PRINT_VAR_NAME(sensor_count) prints "sensor_count"</span></pre>
    <div class="callout warn"><div class="callout-label">A classic macro bug</div><code>#define SQUARE(x) x*x</code> looks fine until you call <code>SQUARE(a+b)</code>, which expands to the text <code>a+b*a+b</code> — not <code>(a+b)*(a+b)</code> — because the preprocessor never adds the parentheses you'd assume a "function" would. Real macros wrap every parameter use in its own parentheses: <code>#define SQUARE(x) ((x)*(x))</code>. This exact failure mode is why many style guides prefer <code>const</code> (Lesson 1.9) or an inline function over a macro wherever either would work just as well.</div>
  `},
  { id:'1-7', title:'Function Pointers & State Machines Built From Them', body:`
    <p>A <strong>function pointer</strong> is a variable that holds the address of a function rather than the address of a piece of data — and it can be called exactly like the function it points to.</p>
    <pre><span class="ty">void</span>(*state)();  <span class="cm">// "state" is a variable holding the address of a function that takes no args and returns nothing</span>
<span class="ty">void</span> state1(<span class="ty">void</span>) { printf("State1 "); state = state2; }
<span class="ty">void</span> state2(<span class="ty">void</span>) { printf("State2 "); state = state1; }

<span class="ty">int</span> main() {
  state = state1;            <span class="cm">// note: the function name with no parentheses — that's its address</span>
  <span class="kw">while</span> (1) { state(); }   <span class="cm">// calls whichever function "state" currently points to</span>
}</pre>
    <p>This is a real, working alternative to the <code>switch</code>-based FSM from Lesson 3.1: instead of one function with a giant switch, each state is its own small function, and transitioning states means reassigning which function the pointer points to. It scales well when each state's logic is large enough to want its own function body, and reads naturally once you're comfortable with the syntax.</p>
    <h4>The declaration syntax, slowly</h4>
    <p>Function pointer syntax is the single most-squinted-at syntax in C. Read it from the inside out: <code>int (*funcPtr_t)(int a, int b);</code> — <code>funcPtr_t</code> is a pointer (<code>*</code>), that points to a function taking two <code>int</code>s, returning an <code>int</code>. A <code>typedef</code> makes this far more readable to use afterward:</p>
    <pre><span class="kw">typedef</span> <span class="ty">int</span> (*funcPtr_t)(<span class="ty">int</span> a, <span class="ty">int</span> b);
<span class="ty">int</span> sum(<span class="ty">int</span> a, <span class="ty">int</span> b)  { <span class="kw">return</span> a + b; }
<span class="ty">int</span> prod(<span class="ty">int</span> a, <span class="ty">int</span> b) { <span class="kw">return</span> a * b; }

funcPtr_t x;
x = sum;
printf("%d\\n", x(2, 3));   <span class="cm">// 5</span>
x = prod;
printf("%d\\n", x(2, 3));   <span class="cm">// 6</span></pre>
    <h4>Enum + switch FSMs — the more common production pattern</h4>
    <p>Many real codebases prefer an explicit <code>enum</code> for states and inputs over function pointers, since it's easier to log, debug, and step through with a debugger — you can print the current state as a name, and there's exactly one function to set a breakpoint in. This is the same shape as Lesson 3.1's FSM, made concrete with named states and inputs:</p>
    <pre><span class="kw">typedef</span> <span class="kw">enum</span>{ IDLE, READY, VENDING, FAULT } state_E;
<span class="kw">typedef</span> <span class="kw">enum</span>{ COIN, COIN_RETURN, BUTTON, VEND_COMPLETE, GENERIC_FAULT } input_E;

state_E update(state_E state, input_E input) {
  <span class="kw">switch</span>(state) {
    <span class="kw">case</span> IDLE:
      <span class="kw">if</span> (input == COIN) state = READY;
      <span class="kw">else if</span> (input == GENERIC_FAULT) state = FAULT;
      <span class="kw">break</span>;
    <span class="kw">case</span> READY:
      <span class="kw">if</span> (input == COIN_RETURN) state = IDLE;
      <span class="kw">else if</span> (input == BUTTON) state = VENDING;
      <span class="kw">else if</span> (input == GENERIC_FAULT) state = FAULT;
      <span class="kw">break</span>;
  }
  <span class="kw">return</span> state;
}</pre>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>Using the <code>funcPtr_t</code> typedef above, declare a variable <code>op</code> of that type, an array of two such pointers called <code>ops[2]</code> containing <code>sum</code> and <code>prod</code>, and a loop that calls both with arguments (4, 5) and prints both results.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer"><pre>funcPtr_t ops[2] = { sum, prod };
<span class="kw">for</span> (<span class="ty">int</span> i = 0; i &lt; 2; i++) {
  printf("%d\\n", ops[i](4, 5));  <span class="cm">// prints 9, then 20</span>
}</pre>
        This array-of-function-pointers pattern is exactly how the command table in Project 2 (Unit 11) is built — a table mapping names or opcodes to handler functions, called through dynamically instead of a long <code>if</code>/<code>else if</code> chain.</div>
      </details>
    </div>
  `},
  { id:'1-8', title:'Structs, Unions & Memory Alignment', body:`
    <p>A <code>struct</code> groups related variables under one name; a <code>typedef</code> gives that struct type a clean name to use elsewhere without writing <code>struct</code> every time:</p>
    <pre><span class="kw">typedef struct</span> {
  <span class="ty">char</span> first;    <span class="cm">// 1 byte</span>
  <span class="ty">int</span> second;   <span class="cm">// 4 bytes</span>
} pair_t;

pair_t p = {1, 2};                  <span class="cm">// positional initializer</span>
pair_t p2 = { .second = 2, .first = 1 }; <span class="cm">// designated initializer — order-independent, self-documenting</span>
<span class="cm">// uninitialized fields in a designated initializer default to 0</span></pre>
    <p>A self-referencing struct (a linked-list node, a tree node) needs the tag name repeated so the struct can name itself inside its own body — the <code>typedef</code> alone isn't visible yet at that point:</p>
    <pre><span class="kw">typedef struct</span> node_t {
  <span class="ty">int</span> value;
  <span class="kw">struct</span> node_t *next;   <span class="cm">// must say "struct node_t", not just "node_t", here</span>
} node_t;</pre>
    <h4>Memory alignment and padding</h4>
    <p>The CPU fetches memory in fixed-size chunks (commonly 4 or 8 bytes at a time), and accessing a value that straddles a chunk boundary costs extra cycles — or on some architectures, isn't allowed at all. To avoid this, the compiler inserts invisible <strong>padding</strong> bytes inside a struct so each member lands on an address that's a multiple of its own size.</p>
    <pre><span class="kw">typedef struct</span> {
  <span class="ty">char</span> a;     <span class="cm">// 1 byte, at offset 0</span>
  <span class="cm">// 3 bytes of invisible padding inserted here</span>
  <span class="ty">int</span> b;      <span class="cm">// 4 bytes, pushed to offset 4 so it's 4-byte aligned</span>
} example_t;   <span class="cm">// sizeof(example_t) == 8, not 5</span></pre>
    <p>Reordering members largest-to-smallest often shrinks a struct's total size for free, since it minimizes how much padding is needed between members — a real, low-effort optimization worth knowing for RAM-constrained firmware.</p>
    <h4>Forcing no padding: <code>__attribute__((packed))</code></h4>
    <p>For network protocols, file formats, or a struct meant to overlay a memory-mapped hardware register exactly, padding is actively harmful — it breaks the byte-for-byte layout the protocol or hardware expects. <code>__attribute__((packed))</code> (a GCC/Clang extension) tells the compiler to omit all padding:</p>
    <pre><span class="kw">typedef struct</span> __attribute__((packed)) {
  <span class="ty">int</span>* x;
  <span class="ty">int</span> y[SIZE];
} struct_name;</pre>
    <p>The tradeoff: a packed struct's misaligned members are genuinely slower to access (the CPU may need multiple reads to assemble one value), and on some architectures, unaligned access isn't just slow but causes a hardware fault outright. Reach for <code>packed</code> only when exact layout is required by something external to your program — never as a default space-saving habit.</p>
    <h4>Unions</h4>
    <p>A <code>union</code> looks like a struct syntactically, but every member <strong>overlaps the same memory</strong> rather than getting its own space — the union is only as large as its biggest member, and writing one member overwrites whatever was in any other. This is useful whenever exactly one interpretation of a value is active at a time, such as reinterpreting a 4-byte integer as its 4 individual bytes:</p>
    <pre><span class="kw">typedef union</span> {
  <span class="ty">int</span> num;       <span class="cm">// assume 4 bytes</span>
  <span class="ty">char</span> byte[4];
} numbyte_t;

numbyte_t nb;
nb.num = 0x01020304;
printf("%02x %02x %02x %02x\\n", nb.byte[0], nb.byte[1], nb.byte[2], nb.byte[3]);
<span class="cm">// on a little-endian system: 04 03 02 01 — see the endianness note below</span></pre>
    <h4>Endianness</h4>
    <p><strong>Big-endian</strong> stores the most-significant byte at the lowest memory address; <strong>little-endian</strong> (what most Cortex-M and x86 systems use by default) stores the least-significant byte first — which is exactly why the union example above prints the bytes of <code>0x01020304</code> in reversed order in a memory dump. This matters concretely whenever you parse a multi-byte value coming over a wire protocol (Unit 5) that doesn't match your CPU's native byte order — you must explicitly swap bytes, or every multi-byte field comes out wrong.</p>
  `},
  { id:'1-9', title:'volatile, const & Compiler Optimization', body:`
    <p>You met <code>volatile</code> in Lesson 1.4 as "don't assume this register stays the same." Here's the fuller picture of what the compiler is actually doing, and why <code>const</code> and a few other tools matter alongside it.</p>
    <h4>What an optimizing compiler is allowed to do</h4>
    <p>Within the rules of the C standard, an optimizing compiler can aggressively rewrite your code as long as the <em>observable behavior</em> stays the same for everything it knows about — and crucially, it knows nothing about hardware changing a memory location on its own. Common transformations:</p>
    <ul>
      <li><strong>Inlining.</strong> Instead of a real function call (push return address, jump, push args, run, pop, return — real overhead), the compiler copies a small function's body directly into the call site. Great for small, frequently-called functions; can bloat code size badly if overused on large functions.</li>
      <li><strong>Loop unrolling.</strong> Instead of looping with a per-iteration branch check, the compiler duplicates the loop body several times in a row, trading code size for fewer branches.</li>
      <li><strong>Dead code elimination.</strong> Variables or whole code paths that are computed but never observably used get removed entirely.</li>
      <li><strong>Caching a value in a register</strong> instead of re-reading it from memory every time it's referenced — the optimization that makes <code>volatile</code> necessary in the first place.</li>
    </ul>
    <p><code>volatile</code> exists to opt a specific variable <em>out</em> of that last optimization: it forces a genuine memory read every single time the variable is referenced, and a genuine memory write every time it's assigned, in the exact order your code specifies. Use it for: hardware registers, a variable written by an ISR and read by the main loop (Lesson 3.4), and a variable shared between threads without other synchronization (Unit 6) — though for that last case, <code>volatile</code> alone is necessary but not sufficient (it doesn't make multi-step operations atomic; see Lesson 3.4's exercise).</p>
    <h4>const</h4>
    <p><code>const</code> declares that a value won't be modified after initialization — and unlike a macro (Lesson 1.6), it's a real, typed variable that exists in memory (or sometimes a CPU register, if the compiler can prove it's never modified and is used often enough to be worth it), with proper compiler type-checking and debugger visibility. Reach for <code>const</code> over a macro whenever you want type safety, the value to be visible by name in a debugger, or the value to obey normal C scoping rules — all things a macro's blind text substitution doesn't give you.</p>
    <h4>Memory barriers</h4>
    <p>Beyond reordering individual reads/writes to a single variable, both the compiler and the CPU itself can reorder <em>independent</em> memory operations relative to each other for performance, as long as no observable single-threaded behavior changes. That reordering can break correctness when another thread or piece of hardware depends on the original order. A <strong>memory barrier</strong> (<code>__sync_synchronize()</code> or similar) is an explicit instruction to both the compiler and CPU: "every memory operation written above this line must be visibly complete before any operation below it begins." It's a sharper, more general tool than <code>volatile</code> for exactly this class of ordering bug, and shows up most often in lock-free code and low-level driver synchronization.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>You declare <code>const int MAX_SAMPLES = 100;</code> at file scope and use it to size a buffer. A teammate suggests replacing it with <code>#define MAX_SAMPLES 100</code> instead, "since it's simpler." Give one concrete reason to keep the <code>const</code> version.</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">A <code>const int</code> is a real, typed variable: the compiler can catch a type mismatch if it's accidentally compared against or assigned to an incompatible type, and a debugger can show you its name and value directly when you're stepping through code. A macro is invisible to both — it vanishes during preprocessing, so a debugger only ever sees the literal number <code>100</code>, with no name attached, and the preprocessor performs zero type checking on how it's used. (One real caveat: a <code>const</code> variable, unlike a macro, can't be used directly as an array size in strict C89/C90, and isn't a true compile-time constant in every context the way a macro or <code>enum</code> value is — worth knowing if you hit that specific error.)</div>
      </details>
    </div>
  `},
  { id:'1-10', title:'Pointer Bugs: Wild, Dangling & Void Pointers', body:`
    <p>Lesson 1.4 introduced pointers as addresses you choose. Here are the specific failure modes that account for a large fraction of real embedded crash reports.</p>
    <h4>Wild pointers</h4>
    <p>A pointer that's declared but never initialized holds whatever garbage bits happened to already be in that memory location — not <code>NULL</code>, not zero, just noise. Dereferencing it reads or writes to a effectively random address, which might silently "work" during testing and then corrupt something real in the field.</p>
    <pre><span class="ty">int</span> *ptr;        <span class="cm">// wild — points at garbage, not at anything you chose</span>
*ptr = 5;        <span class="cm">// undefined behavior: could crash, could silently corrupt unrelated memory</span></pre>
    <p>The fix is a habit, not a tool: always initialize a pointer at declaration, either to a real address or explicitly to <code>NULL</code> — and treat "declared a pointer but haven't assigned it yet" as a bug waiting to happen, the same way an uninitialized loop counter is.</p>
    <h4>Dangling pointers</h4>
    <p>A pointer that's perfectly valid the moment it's set, but now points at memory that's been freed (or, for a stack address, has gone out of scope) is <strong>dangling</strong>. The memory it points to might still happen to hold the old value for a while — which is exactly what makes this bug so dangerous: it can appear to work for a long time and then fail unpredictably once that memory gets reused for something else.</p>
    <pre><span class="ty">int</span> *p = malloc(<span class="kw">sizeof</span>(<span class="ty">int</span>));
*p = 10;
free(p);          <span class="cm">// memory released back to the heap — p now dangles</span>
<span class="cm">// p still holds the old address, but it no longer owns that memory</span>
*p = 20;          <span class="cm">// undefined behavior — writing through a dangling pointer</span></pre>
    <p>The standard discipline: immediately after <code>free(p)</code>, set <code>p = NULL;</code>. A null pointer dereference crashes immediately and obviously at the exact line that misuses it; a dangling pointer corrupts memory silently and the resulting crash, if any, often happens somewhere completely unrelated, much later — making it dramatically harder to trace back to its actual cause.</p>
    <h4>Void pointers</h4>
    <p>A <code>void*</code> is a "generic" pointer — it holds an address but deliberately carries no type information about what's stored there, and the compiler will implicitly let you assign almost any pointer type to or from it. The cost of that flexibility: you must explicitly cast it back to a real type before dereferencing it, because the compiler has no way to know how many bytes to read or how to interpret them otherwise.</p>
    <pre><span class="ty">void</span> *ptr;
<span class="ty">int</span> x = 10;
ptr = &amp;x;                      <span class="cm">// any pointer type converts to void* implicitly</span>
<span class="ty">int</span> y = *((<span class="ty">int</span>*)ptr);          <span class="cm">// must cast back explicitly before dereferencing</span></pre>
    <p>This is exactly the mechanism behind <code>malloc</code> (Lesson 1.4 first showed it; it returns <code>void*</code> since it has no idea what type you intend to store) and behind passing arbitrary data into a thread's entry function (Unit 6) — a generic <code>void*</code> "envelope" that gets cast back to its real, known type as the very first step inside the function that receives it.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>What's wrong with this function, and what's the one-line fix?</p>
      <pre><span class="ty">int</span>* make_value(<span class="ty">int</span> v) {
  <span class="ty">int</span> result = v * 2;
  <span class="kw">return</span> &amp;result;   <span class="cm">// returning the address of a local variable</span>
}</pre>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer"><code>result</code> is a stack-allocated local variable (Lesson 1.5) — its memory is reclaimed the instant <code>make_value</code> returns. The returned pointer is dangling before the caller ever uses it; the value might look correct by coincidence (the stack memory hasn't been overwritten yet) or might already be garbage, and which one happens is exactly the kind of timing-dependent bug that's brutal to reproduce. The fix is to heap-allocate it instead — <code>int *result = malloc(sizeof(int)); *result = v * 2; return result;</code> — with the caller now responsible for eventually calling <code>free()</code> on it, or better, change the function signature to write into a caller-provided buffer and avoid dynamic allocation entirely, which is the preferred pattern in most embedded code (Lesson 1.4's static-allocation guidance).</div>
      </details>
    </div>
  `},
  { id:'1-11', title:'Linear Interpolation: Estimating Values Between Known Points', body:`
    <p>A recurring problem shows up the moment you have a sensor whose raw reading doesn't map linearly onto a real-world unit, or any small table of known <code>(x, y)</code> pairs where you need a reasonable estimate for an <code>x</code> that falls <em>between</em> two table entries rather than landing exactly on one. <strong>Linear interpolation</strong> is the standard, cheap answer: draw a straight line between the two known points on either side of your input, and read the answer off that line.</p>
    <h4>The formula</h4>
    <p>Given two known points <code>(x_low, y_low)</code> and <code>(x_high, y_high)</code>, and a target <code>x</code> somewhere between them, the estimated <code>y</code> is found by treating the fraction of the way <code>x</code> sits between <code>x_low</code> and <code>x_high</code> as the same fraction of the way the answer sits between <code>y_low</code> and <code>y_high</code>:</p>
    <pre>y = ((x - x_low) / (x_high - x_low)) * (y_high - y_low) + y_low</pre>
    <p>Read it as: <em>(how far across, as a fraction) &times; (total vertical distance) + (starting height)</em>. If <code>x</code> sits exactly at <code>x_low</code>, the fraction is 0 and you get <code>y_low</code> back exactly; at <code>x_high</code>, the fraction is 1 and you get <code>y_high</code> back exactly &mdash; anywhere in between scales smoothly.</p>
    <pre><span class="ty">float</span> arrX[5] = { 1, 2, 3, 4, 5 };
<span class="ty">float</span> arrY[5] = { 2, 4, 6, 8, 10 };

<span class="ty">float</span> interpolate(<span class="ty">float</span> val) {
  <span class="kw">if</span> (val &gt;= arrX[0] &amp;&amp; val &lt;= arrX[4]) {
    <span class="ty">float</span> XL = arrX[0], XH = arrX[4];
    <span class="ty">float</span> YL = arrY[0], YH = arrY[4];
    <span class="kw">return</span> ((val - XL) / (XH - XL)) * (YH - YL) + YL;
  } <span class="kw">else</span> {
    <span class="kw">return</span> -1;  <span class="cm">// outside the table's known range -- can't interpolate, only the much riskier "extrapolate"</span>
  }
}</pre>
    <div class="callout warn"><div class="callout-label">A subtle limitation in the code above</div>This version always interpolates between the table's <em>first</em> and <em>last</em> entries, no matter how many points sit in between &mdash; which only gives a correct answer if every point in the table actually lies on one straight line. The moment your table represents a curve (almost every real sensor calibration table does), you need to first find the <em>specific pair</em> of adjacent points that bracket <code>val</code>, and interpolate only between those two &mdash; see the exercise below.</div>
    <h4>Where this shows up in firmware</h4>
    <p>The most common embedded use case is exactly the one the warning above points at: a <strong>sensor calibration table</strong>. A thermistor or a non-linear pressure sensor often ships with a datasheet table of raw ADC counts (Lesson 5.2) mapped to real-world units at a handful of measured points, not a clean formula &mdash; interpolating between the two bracketing table entries turns that sparse table into a continuous, reasonably accurate reading at any input. The same technique applies to building a custom easing curve for a motor's commanded speed, or generating an LED brightness curve that looks linear to the human eye even though perceived brightness isn't linear in raw PWM duty cycle (Lesson 5.3).</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>Generalize <code>interpolate</code> above so it works correctly for a table that represents a curve, not just a straight line: find the correct adjacent pair of points that bracket <code>val</code> (a simple linear scan through the array is fine), then interpolate only between that pair.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer"><pre><span class="ty">float</span> interpolate(<span class="ty">float</span> val) {
  <span class="kw">if</span> (val &lt; arrX[0] || val &gt; arrX[4]) <span class="kw">return</span> -1;
  <span class="kw">for</span> (<span class="ty">int</span> i = 0; i &lt; 4; i++) {
    <span class="kw">if</span> (val &gt;= arrX[i] &amp;&amp; val &lt;= arrX[i+1]) {
      <span class="ty">float</span> XL = arrX[i], XH = arrX[i+1];
      <span class="ty">float</span> YL = arrY[i], YH = arrY[i+1];
      <span class="kw">return</span> ((val - XL) / (XH - XL)) * (YH - YL) + YL;
    }
  }
  <span class="kw">return</span> -1;  <span class="cm">// unreachable if the bounds check above passed, but keeps the compiler happy</span>
}</pre>
        Now each segment between adjacent table points is treated as its own short straight line, so the overall result tracks a curved calibration table far more accurately &mdash; the more points the table has, the better a piecewise-linear approximation gets. For a large table where this linear scan becomes a real cost, a binary search over the (sorted) <code>x</code> array finds the bracketing pair in O(log n) instead of O(n).</div>
      </details>
    </div>
  `},
] },

{ id:'u2', title:'Unit 2 — The Microcontroller', lessons:[
  { id:'2-1', title:'Anatomy of a Microcontroller', body:`
    <p>A microcontroller (MCU) is a complete small computer on one chip: a CPU core, a small amount of memory, and a set of <strong>peripherals</strong> — specialized circuits for talking to the outside world — all connected by internal buses, all running off one clock source.</p>
    <ul>
      <li><strong>CPU core</strong> — executes instructions. Most modern MCUs use an ARM Cortex-M core (M0, M3, M4, M7 — increasing in performance and feature set); some older or cost-sensitive designs use 8-bit cores like AVR or 8051, or 16-bit cores like MSP430.</li>
      <li><strong>Flash memory</strong> — non-volatile storage for your compiled program. Survives power loss. Typically tens of KB to a few MB.</li>
      <li><strong>SRAM</strong> — volatile working memory for variables, the stack, and the heap if used. Typically a few KB to a few hundred KB — far smaller than flash, and the resource you'll run out of first.</li>
      <li><strong>Peripherals</strong> — GPIO controllers, timers, UART/SPI/I²C/CAN controllers, ADC/DAC converters, sometimes a DMA controller — each offloading a specific job from the CPU.</li>
      <li><strong>Buses &amp; clock tree</strong> — internal highways connecting the core to peripherals, plus a network of clock dividers letting different peripherals run at different speeds from one master oscillator.</li>
    </ul>
    <div class="callout"><div class="callout-label">Why this matters</div>Every peripheral you'll learn — GPIO, UART, ADC, timers, CAN — is the <em>same architectural idea</em> repeated: a block of hardware with its own registers, sitting on the bus, waiting for the CPU to configure it by writing specific bits to specific addresses. Learn that pattern once and every new peripheral becomes "which registers, which bits" rather than a new concept.</div>
  `},
  { id:'2-2', title:'Memory-Mapped I/O & the Address Space', body:`
    <p>Here is the idea that unlocks the rest of this course: <strong>on most microcontrollers, hardware peripherals are accessed by reading and writing memory addresses</strong>, exactly like a variable. There's no special "talk to hardware" instruction — the CPU does an ordinary memory read or write, and that address happens to be wired to a peripheral instead of RAM. This scheme is called <strong>memory-mapped I/O</strong>.</p>
    <p>A typical Cortex-M address space is divided into fixed regions, each a few hundred MB wide, by convention rather than by physical necessity:</p>
    <table><tr><td>Address range</td><td>Region</td><td>Contents</td></tr>
      <tr><td>0x0000 0000</td><td>Code</td><td>Flash — your compiled program</td></tr>
      <tr><td>0x2000 0000</td><td>SRAM</td><td>Variables, stack, heap</td></tr>
      <tr><td>0x4000 0000</td><td>Peripheral</td><td>GPIO, UART, timers, ADC registers</td></tr>
      <tr><td>0xE000 0000</td><td>System</td><td>NVIC, debug components — core infrastructure</td></tr></table>
    <p>A peripheral's configuration is exposed as <strong>registers</strong> — fixed-size memory locations, usually 32 bits wide, where each bit or group of bits means something specific. The datasheet's job is to tell you exactly what each bit does; your job is to set the right bits for the behavior you want.</p>
    <pre><span class="cm">// pseudocode showing the underlying mechanism</span>
<span class="ty">volatile uint32_t</span> *GPIOA_MODER = (<span class="ty">uint32_t</span>*)0x40020000;
*GPIOA_MODER |= (1 &lt;&lt; 10);  <span class="cm">// set pin 5 to output mode — bits 11:10 control pin 5</span></pre>
    <p>In real projects you rarely write raw addresses — vendor headers wrap them in structs (Lesson 1.4), and HAL libraries wrap those into functions like <code>HAL_GPIO_WritePin(...)</code>. But every layer compiles down to exactly this: a write to a fixed address. When something doesn't behave as documented, dropping back down to "what bit, what register, what address" is almost always how you debug it.</p>
  `},
  { id:'2-3', title:'GPIO: Ports, Pins, Modes & Drive Types', body:`
    <p><strong>GPIO</strong> (General-Purpose Input/Output) is usually the first peripheral anyone touches, because it's the most direct: a pin the CPU can drive high, drive low, or read. Pins are grouped into <strong>ports</strong> (Port A, Port B, ...), each controlled by its own registers, with each pin a single bit position in those registers.</p>
    <ul>
      <li><strong>Mode register (e.g. <code>MODER</code>)</strong> — input, output, alternate function (used by a peripheral like UART), or analog.</li>
      <li><strong>Output Data Register (<code>ODR</code>)</strong> — for outputs, bit <em>n</em> = 1 drives pin <em>n</em> high; 0 drives it low.</li>
      <li><strong>Input Data Register (<code>IDR</code>)</strong> — for inputs, bit <em>n</em> reflects the current voltage on pin <em>n</em>.</li>
      <li><strong>Pull-up/down register</strong> — enables an internal pull resistor (Lesson 1.3) without external components.</li>
    </ul>
    <h4>Push-pull vs. open-drain</h4>
    <p>A <strong>push-pull</strong> output actively drives the pin to both HIGH and LOW — the default, and what you want almost always. An <strong>open-drain</strong> output can only actively pull LOW; to read HIGH, an external (or internal) pull-up resistor has to do the work. Open-drain matters whenever multiple devices share one wire and might disagree about its state — exactly the situation on an I²C bus (Unit 4), where two devices both driving push-pull HIGH and LOW simultaneously would short circuit against each other.</p>
    <p>The simulator below models a simplified 8-pin ODR register driving 8 virtual LEDs — toggle bits and watch them respond the way real silicon would.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>Using the GPIO simulator above (or just paper), figure out the hex value of <code>ODR</code> that turns on pins 1, 3, and 7 and leaves every other pin low. Then write the single line of C that achieves that starting from <code>ODR = 0x00</code>, using OR and shifts rather than a hardcoded hex literal.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">Pins 1, 3, 7 set means bits 1, 3, 7 are 1: binary <code>1000 1010</code> = <code>0x8A</code>.
        <pre>GPIOA-&gt;ODR |= (1 &lt;&lt; 1) | (1 &lt;&lt; 3) | (1 &lt;&lt; 7);</pre>
        Using named shifts instead of the raw hex literal is the better habit in real firmware: it documents <em>which pins</em> and survives someone reordering the pinout later without anyone having to recompute hex by hand.</div>
      </details>
    </div>
  `, widget:'gpioSim' },
  { id:'2-4', title:'From Source Code to Running Firmware: Compiler, Linker, Flash, Debug', body:`
    <p>Writing C is only the first step. Getting it running on real silicon goes through a pipeline worth knowing by name, because error messages reference each stage.</p>
    <ol>
      <li><strong>Compile.</strong> A cross-compiler (running on your laptop, generating code for the MCU's instruction set — hence "cross") turns each <code>.c</code> file into an object file of machine instructions.</li>
      <li><strong>Link.</strong> The linker stitches object files and libraries into one executable image, and places each piece of code and data at a specific address using a <strong>linker script</strong>. The standard sections you'll see in any map file: <code>.text</code> (compiled code, lives in flash), <code>.rodata</code> (constants/string literals, flash), <code>.data</code> (initialized globals — stored in flash, copied to RAM at startup), and <code>.bss</code> (zero-initialized globals — given space in RAM but not stored in the flash image at all, since "all zero" needs no storage).</li>
      <li><strong>Flash.</strong> A programmer/debugger (ST-Link, J-Link, etc.) copies the final binary into the chip's flash over a debug interface — usually <strong>SWD</strong> (Serial Wire Debug) or JTAG.</li>
      <li><strong>Run &amp; debug.</strong> On reset, the CPU starts executing from a fixed address in flash — the <strong>reset handler</strong>, part of the startup code generated by your toolchain, which copies <code>.data</code> from flash to RAM, zeroes <code>.bss</code>, then calls <code>main()</code>. The same debug interface lets you halt, breakpoint, single-step, and inspect registers and memory live.</li>
    </ol>
    <div class="callout"><div class="callout-label">Why it's different from app development</div>There's no operating system loading your program on demand. Your firmware <em>is</em> the entire contents of the chip's memory — there's nothing else running underneath it (unless you've added an RTOS, Unit 6). That's also why a single bad pointer write can corrupt the program itself, not just crash a process — there's no OS keeping your code in its own sandboxed lane.</div>
    <h4>The vector table</h4>
    <p>The very first thing in flash is the <strong>vector table</strong> — a fixed array of addresses, the first being the initial stack pointer value, the second being the reset handler's address, followed by one entry per possible interrupt (Unit 3). The CPU reads this table directly out of hardware on power-up before a single line of your code runs, which is how it knows where to start and where to jump when each interrupt eventually fires.</p>
  `},
  { id:'2-5', title:'Clocks, Power Domains & the Watchdog Timer', body:`
    <p>Every digital circuit on the chip needs a clock signal to know when to update. Configuring that clock correctly is one of the very first things any firmware project does, and getting it wrong is a classic "nothing works and there's no obvious reason why" bug.</p>
    <h4>The clock tree</h4>
    <p>An MCU typically has multiple clock sources to choose from: an internal RC oscillator (no external parts needed, but imprecise and drifts with temperature), an external crystal oscillator (precise, but requires two external components on the board), and sometimes a separate low-speed oscillator just for timekeeping during sleep. A <strong>PLL</strong> (Phase-Locked Loop) can multiply a slower, cheaper reference clock up to the speed the CPU actually wants to run at. From there, a tree of programmable dividers feeds each peripheral its own clock, often at a different speed than the CPU core — which is exactly why "enable the peripheral's clock" is almost always the very first register write in any peripheral driver; a perfectly configured peripheral that never receives a clock will silently do nothing.</p>
    <h4>Low-power modes</h4>
    <p>Battery-powered embedded systems spend most of their life asleep. Common modes, from lightest to deepest: <strong>Sleep</strong> (CPU halted, peripherals and RAM still powered, wakes instantly on almost any interrupt); <strong>Stop</strong> (most clocks halted, RAM retained, wakes more slowly, on a smaller set of events); <strong>Standby</strong> (nearly everything powered down, RAM often lost, wakes only via a reset-like event such as a dedicated wake pin or RTC alarm). Choosing a mode is a direct trade between wake-up latency and power draw — a system reacting to a button press can afford Stop mode's slower wake-up; a system needing to respond within microseconds usually can't.</p>
    <h4>The watchdog timer (WDT)</h4>
    <p>A <strong>watchdog timer</strong> is a hardware countdown timer with one job: if it ever reaches zero, it forces a full chip reset. Firmware is responsible for periodically "kicking" (refreshing) it before that happens — and the entire point is that if the main loop ever hangs (an infinite loop, a deadlock, a fault that isn't otherwise caught), the kick code stops running, the watchdog isn't refreshed, and the chip resets itself back to a known-good state rather than staying stuck forever. It's a deliberately dumb, hardware-only safety net that exists precisely because software safety nets can themselves get stuck.</p>
    <p>Try it below: kick the dog to keep the system alive, or stop kicking and watch what happens.</p>
  `, widget:'watchdogSim' },
  { id:'2-6', title:'DMA: Moving Data Without the CPU', body:`
    <p><strong>DMA</strong> (Direct Memory Access) is a peripheral whose entire job is copying data from one memory location to another — peripheral register to RAM, RAM to RAM, RAM to peripheral register — without the CPU executing a single instruction per byte moved. You configure a source address, destination address, and length once; the DMA controller then runs the transfer in the background while the CPU goes on to do something else entirely, and optionally raises an interrupt only when the whole transfer is done.</p>
    <h4>Why it matters</h4>
    <p>Without DMA, streaming data from a fast ADC or UART means an interrupt fires for every single sample or byte — at high data rates, that can mean the CPU spends nearly all its time just shuffling bytes, with none left for actual decision-making. With DMA, the ADC can sample continuously straight into a RAM buffer, and the CPU is only interrupted once the buffer is full (or half-full, for streaming designs that process one half while the other fills) — turning a potentially CPU-saturating job into something close to free.</p>
    <pre><span class="cm">// conceptual setup, not a real register sequence</span>
dma_configure(source = &amp;ADC1-&gt;DR, destination = sample_buffer, length = 256);
dma_start();
<span class="cm">// CPU is now free — an interrupt fires only when all 256 samples have landed</span></pre>
    <div class="callout violet"><div class="callout-label">Where you'll meet this again</div>High-rate sensor sampling (an IMU or encoder polled every loop), audio/waveform generation via DAC, and bulk UART/SPI transfers are the three places DMA shows up constantly in real firmware — including, very likely, in any encoder or sensor pipeline running at the kind of rate a control loop needs.</div>
  `},
] },

{ id:'u3', title:'Unit 3 — Control Flow', lessons:[
  { id:'3-1', title:'Finite State Machines', body:`
    <p>Almost every embedded control loop is, underneath, a <strong>finite state machine (FSM)</strong>: a system always in exactly one of a fixed set of named states, moving between states only in response to defined events. FSMs are popular in firmware because they make behavior provable and debuggable — at any instant you can ask "what state are we in?" and get one unambiguous answer, instead of untangling a maze of booleans.</p>
    <p>An FSM has three parts: <strong>states</strong> (named conditions, drawn as circles), <strong>transitions</strong> (the labeled arrows between them), and an <strong>entry/exit action</strong> per state. In C, an FSM is usually a <code>switch</code> inside a loop, one <code>case</code> per state:</p>
    <pre><span class="kw">switch</span> (state) {
  <span class="kw">case</span> STATE_RED:
    <span class="kw">if</span> (timer_expired()) state = STATE_GREEN;
    <span class="kw">break</span>;
  <span class="kw">case</span> STATE_GREEN:
    <span class="kw">if</span> (timer_expired()) state = STATE_YELLOW;
    <span class="kw">break</span>;
  <span class="kw">case</span> STATE_YELLOW:
    <span class="kw">if</span> (timer_expired()) state = STATE_RED;
    <span class="kw">break</span>;
}</pre>
    <p>Larger systems often use <strong>hierarchical</strong> FSMs — a "Fault" superstate containing several fault sub-states, all of which share common entry behavior (cut power, log the cause) without duplicating that logic in every individual fault case. The core discipline scales: name every state honestly, including the ones nobody likes thinking about — fault, recovery, shutdown — not just the happy path.</p>
    <p>Step through the traffic-light FSM below — each click is one "tick," exactly like one pass through a firmware main loop.</p>
  `, widget:'fsmSim' },
  { id:'3-2', title:'Interrupts', body:`
    <p>A polling loop checks "has anything happened?" repeatedly, burning CPU time even when the answer is no. An <strong>interrupt</strong> flips that model: hardware notifies the CPU the instant something happens, the CPU pauses what it was doing, runs a small handler called an <strong>Interrupt Service Routine (ISR)</strong>, then resumes exactly where it left off — like a phone call interrupting whatever you were doing, picking back up exactly where you were once you hang up.</p>
    <p>The mechanism, in order:</p>
    <ol>
      <li>A peripheral (timer expiring, UART byte arriving, pin changing state) raises an interrupt request.</li>
      <li>The <strong>NVIC</strong> (Nested Vectored Interrupt Controller, on ARM Cortex-M) checks whether that interrupt is enabled and compares its <strong>priority</strong> against whatever's currently running.</li>
      <li>If it should run now, the CPU automatically saves its state onto the stack and jumps to the matching entry in the <strong>vector table</strong> — a fixed list of handler addresses, one per interrupt source.</li>
      <li>Your ISR runs — and should run <em>fast</em>: do the minimum necessary (read a value, set a flag, clear the interrupt source) and let the main loop handle anything slow.</li>
      <li>The CPU restores its saved state and resumes the interrupted code as if nothing happened.</li>
    </ol>
    <div class="callout warn"><div class="callout-label">The rule everyone learns the hard way</div>Keep ISRs short. A long ISR blocks lower-priority interrupts and delays the main loop — exactly the kind of timing bug that's miserable to reproduce, since it depends on exactly when the interrupt fired relative to everything else.</div>
    <p>The timeline below shows why interrupts exist: the main loop is busy, but the moment a button-press interrupt fires, execution jumps to the ISR immediately, regardless of what the main loop was doing.</p>
  `, widget:'interruptSim' },
  { id:'3-3', title:'NVIC Priorities, Nesting & Critical Sections', body:`
    <p>Real systems have many interrupt sources competing for attention, and not all of them are equally urgent. The NVIC lets you assign each interrupt a numeric <strong>priority</strong> — lower numbers usually mean higher priority — and the hardware enforces the consequences automatically.</p>
    <h4>Preemption</h4>
    <p>If a higher-priority interrupt fires while a lower-priority ISR is already running, the CPU pauses the lower-priority ISR and immediately runs the higher-priority one first — this is called <strong>nesting</strong>. A low-priority ISR can be interrupted multiple times before it ever finishes. This is exactly why "keep ISRs short" (Lesson 3.2) compounds in importance: a long low-priority ISR doesn't just delay the main loop, it delays every other interrupt at or below its own priority level for its entire duration.</p>
    <h4>Sub-priorities and tail-chaining</h4>
    <p>Many NVIC implementations split priority into a "preempt priority" (can it interrupt something already running?) and a "sub-priority" (tie-breaker for ordering when two interrupts are pending at the same preempt level but neither is currently running). When one ISR finishes and another is already pending, many cores support <strong>tail-chaining</strong> — jumping straight into the next ISR without the overhead of fully restoring and re-saving CPU state in between, a small but real latency optimization in interrupt-heavy systems.</p>
    <h4>Critical sections</h4>
    <p>Sometimes a piece of code genuinely cannot be interrupted safely — modifying a multi-step shared data structure, for instance. The blunt tool for this is globally disabling interrupts for the shortest possible window:</p>
    <pre>__disable_irq();
shared_counter++;     <span class="cm">// guaranteed atomic now — nothing can preempt this line</span>
__disable_irq();
__enable_irq();</pre>
    <div class="callout danger"><div class="callout-label">Why "shortest possible window" matters</div>Disabling interrupts even for a few extra microseconds can delay a time-critical event you don't even know is waiting — a UART byte that overruns its buffer, a control loop tick that arrives late. Critical sections should be measured in single-digit instructions, not milliseconds.</div>
  `},
  { id:'3-4', title:'Writing ISR-Safe Code', body:`
    <p>An ISR runs in a fundamentally different context than normal code, and several ordinary habits become dangerous inside one.</p>
    <ul>
      <li><strong>No blocking calls.</strong> Anything that waits — a busy-loop polling a flag, a delay function, certainly anything that could block on an RTOS queue — can stall every lower-or-equal-priority interrupt in the system for the duration. ISRs should never wait for anything; they should act on what's already available and return.</li>
      <li><strong>No <code>malloc</code> in most embedded contexts, ever, but especially not in an ISR.</strong> Standard allocators are frequently not reentrant-safe, meaning a malloc interrupted by another malloc (from the ISR) can corrupt the heap's internal bookkeeping.</li>
      <li><strong>Be careful with <code>printf</code>/logging.</strong> Most printf implementations are slow and not interrupt-safe; logging from an ISR is a common source of both timing blowouts and corrupted output.</li>
