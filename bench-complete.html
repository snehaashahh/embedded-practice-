      <li><strong>Shared variables need <code>volatile</code>, and sometimes more.</strong> A variable written by an ISR and read by the main loop (or vice versa) needs <code>volatile</code> at minimum (Lesson 1.4) so the compiler doesn't cache a stale copy in a register. For anything wider than a single atomic read/write — a multi-byte struct, a counter being both read and incremented from two contexts — <code>volatile</code> alone isn't enough; you need a critical section (Lesson 3.3) or, in an RTOS, a proper synchronization primitive (Unit 6).</li>
    </ul>
    <pre><span class="kw">volatile uint8_t</span> new_byte_flag = 0;
<span class="kw">volatile uint8_t</span> last_byte;

<span class="cm">// ISR — fast, no blocking, just records and flags</span>
<span class="kw">void</span> USART1_IRQHandler(<span class="kw">void</span>) {
  last_byte = USART1-&gt;DR;
  new_byte_flag = 1;
}

<span class="cm">// main loop — does the actual (slower) work</span>
<span class="kw">if</span> (new_byte_flag) {
  new_byte_flag = 0;
  process_byte(last_byte);  <span class="cm">// safe to take longer here</span>
}</pre>
    <p>This "ISR does the minimum, flags work for the main loop" pattern is close to universal in production firmware, and is the practical answer to nearly every "how do I make my interrupt handler safe" question.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>Spot the bug: a sensor ISR increments a 32-bit <code>volatile uint32_t sample_count</code> every time it fires. The main loop does <code>if (sample_count >= 100) { process_batch(); sample_count = 0; }</code>. On an 8-bit MCU (where a 32-bit read/write takes multiple instructions), what can go wrong, and what's the minimal fix?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">On an 8-bit core, a 32-bit read or write isn't atomic — it takes several instruction cycles. If the ISR fires in the middle of the main loop reading or clearing <code>sample_count</code>, the main loop can observe a torn (half-old, half-new) value, or the ISR's increment can be lost entirely if it lands between the main loop's read and its write of zero. <code>volatile</code> only guarantees the compiler won't cache the value — it says nothing about atomicity. The minimal fix is a short critical section around the read-and-clear: disable interrupts, copy and clear <code>sample_count</code> in one uninterruptible block, then re-enable interrupts and process the copy outside the critical section.</div>
      </details>
    </div>
  `},
  { id:'3-5', title:'Polling vs. Interrupts, and Debouncing', body:`
    <p>Now that you've seen both styles in depth, here's how to choose between them in practice:</p>
    <table><tr><td>&nbsp;</td><td>Polling</td><td>Interrupt-driven</td></tr>
      <tr><td>CPU usage while idle</td><td>Wastes cycles checking repeatedly</td><td>Free to sleep or do other work</td></tr>
      <tr><td>Response latency</td><td>Bounded by loop period</td><td>Near-immediate</td></tr>
      <tr><td>Complexity</td><td>Simple to reason about</td><td>Concurrency bugs become possible</td></tr>
      <tr><td>Best for</td><td>Predictable, frequent checks</td><td>Rare or time-critical events</td></tr></table>
    <p>A classic place both ideas collide is reading a mechanical button or switch. The metal contacts don't snap cleanly from open to closed — they physically bounce, producing a burst of spurious transitions in a few milliseconds. Read it naively and one "press" looks like five.</p>
    <p><strong>Debouncing</strong> fixes this, usually built as its own small FSM: an <code>IDLE</code> state waits for the first edge; a <code>DEBOUNCE</code> state ignores further changes for a short window (often 10–50 ms, timed with a timer interrupt); then a <code>PRESSED</code> state confirms the new value is stable before reporting it. It's a direct, practical fusion of everything in this unit: an event-driven trigger, a timer, and a state machine that refuses to trust a single noisy reading.</p>
  `},
] },

{ id:'u4', title:'Unit 4 — Talking to the World', lessons:[
  { id:'4-1', title:'UART: Asynchronous Serial', body:`
    <p><strong>UART</strong> (Universal Asynchronous Receiver/Transmitter) is the simplest common way two devices send bytes to each other: two wires (TX and RX, crossed between devices), no shared clock line — which is exactly what "asynchronous" means here.</p>
    <p>That timing agreement is the <strong>baud rate</strong> — bits per second — wrapped around a fixed <strong>frame</strong> format:</p>
    <ul>
      <li>The line idles <strong>high</strong> when nothing is being sent.</li>
      <li>A <strong>start bit</strong> (line pulled low) signals "a byte begins now" and lets the receiver sync its timing.</li>
      <li><strong>8 data bits</strong>, sent least-significant-bit first.</li>
      <li>An optional <strong>parity bit</strong> for basic error checking ("8N1" = 8 data bits, no parity, 1 stop bit — the most common configuration by far).</li>
      <li>One or two <strong>stop bits</strong> (line returns high) to mark the frame's end.</li>
    </ul>
    <p>Both sides must be configured to the same baud rate or the receiver samples bits at the wrong moments and reads garbage — by far the most common first bug anyone hits with UART.</p>
    <p>Build a frame below: type a byte, pick a baud rate, and watch the actual waveform and timing UART would put on the wire.</p>
    <pre><span class="cm">// STM32 HAL — blocking transmit/receive</span>
HAL_UART_Transmit(&amp;huart2, (uint8_t*)data, sizeof(data), HAL_MAX_DELAY);
HAL_UART_Receive(&amp;huart2, rx_buf, sizeof(rx_buf), HAL_MAX_DELAY);
<span class="cm">// interrupt-driven receive — fires HAL_UART_RxCpltCallback() when 1 byte arrives</span>
HAL_UART_Receive_IT(&amp;huart2, &amp;rx_byte, 1);</pre>
  `, widget:'uartSim' },
  { id:'4-2', title:'SPI: Synchronous, Fast, Point-to-Point', body:`
    <p><strong>SPI</strong> (Serial Peripheral Interface) trades UART's simplicity for speed by adding a shared clock line — no need to pre-agree on timing, and both sides can run much faster: SPI commonly runs tens of MHz versus UART's typical kilobits-to-low-megabits range.</p>
    <p>SPI uses four signals, with one <strong>master</strong> (usually the MCU) and one or more <strong>slaves</strong>:</p>
    <ul>
      <li><strong>SCLK</strong> — clock, generated by the master; every device reads/writes a bit on each clock edge.</li>
      <li><strong>MOSI</strong> — Master Out, Slave In.</li>
      <li><strong>MISO</strong> — Master In, Slave Out, often simultaneous with MOSI (full-duplex).</li>
      <li><strong>CS / SS</strong> — Chip Select: the master pulls this line low on the one slave it wants to talk to; every other slave ignores the bus.</li>
    </ul>
    <h4>Clock polarity and phase (CPOL/CPHA)</h4>
    <p>SPI has four "modes," set by two bits: <strong>CPOL</strong> (does the clock idle high or low?) and <strong>CPHA</strong> (is data sampled on the first clock edge or the second?). Both devices must agree on the mode or every byte transferred is corrupted, despite the wiring being completely correct — a classic "I checked the wiring three times" SPI bug that's actually a one-line configuration mismatch.</p>
    <p>Because there's a dedicated chip-select line per device, SPI scales to multiple peripherals cleanly (one extra wire per device) but doesn't have built-in addressing the way I²C does — the master must know in advance which CS line means which sensor.</p>
    <pre><span class="cm">// STM32 HAL — CS is just a GPIO pin you drive manually around the transfer</span>
HAL_GPIO_WritePin(GPIOB, GPIO_PIN_6, 0);          <span class="cm">// CS low — select the slave</span>
HAL_SPI_Transmit(&amp;hspi1, (uint8_t*)&amp;tx_byte, 1, HAL_MAX_DELAY);
HAL_SPI_Receive(&amp;hspi1, rx_buf, 1, HAL_MAX_DELAY);
HAL_GPIO_WritePin(GPIOB, GPIO_PIN_6, 1);          <span class="cm">// CS high — deselect</span></pre>
  `},
  { id:'4-3', title:'I²C: Two Wires, Many Devices', body:`
    <p><strong>I²C</strong> (Inter-Integrated Circuit) solves a different problem than SPI: how to put many devices on a bus using only two wires total, no matter how many devices you add.</p>
    <ul>
      <li><strong>SDA</strong> — a single shared data line.</li>
      <li><strong>SCL</strong> — a single shared clock line, normally driven by whichever device is currently bus master.</li>
      <li>Every device has a unique 7-bit (or 10-bit) <strong>address</strong>. The master starts a transaction by sending that address; only the matching device responds.</li>
      <li>Each byte is followed by an <strong>ACK/NACK</strong> bit from the receiver confirming receipt — built-in error feedback SPI doesn't have.</li>
    </ul>
    <h4>Open-drain, and why that matters here</h4>
    <p>Both SDA and SCL are <strong>open-drain</strong> (Lesson 2.3) with external pull-up resistors — every device can pull the line LOW, but no device alone can drive it HIGH; the pull-ups do that. This lets multiple devices share the lines without one fighting another's drive, and lets a slow slave "stretch" the clock by holding SCL low to buy itself more processing time — a feature called <strong>clock stretching</strong>, invisible to the master beyond the transaction simply taking a bit longer.</p>
    <table><tr><td>&nbsp;</td><td>SPI</td><td>I²C</td></tr>
      <tr><td>Wires</td><td>4 (+1 CS per device)</td><td>2, shared by all devices</td></tr>
      <tr><td>Speed</td><td>Fast — tens of MHz</td><td>Slower — typically 100 kHz–1 MHz</td></tr>
      <tr><td>Addressing</td><td>Via a dedicated CS line per device</td><td>Built into the protocol</td></tr>
      <tr><td>Typical use</td><td>Displays, SD cards, fast sensors</td><td>Low-speed sensors, EEPROMs, many devices on one bus</td></tr></table>
    <p>Rule of thumb: reach for I²C with many low-speed devices to economize wires; reach for SPI for raw throughput — streaming pixels to a display, reading a high-rate IMU.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>You wire up two I²C temperature sensors to the same bus and both happen to ship with the same fixed 7-bit address, hardwired at the factory with no address-select pin. Name two different ways to fix this without removing either sensor.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">1) Put each sensor on a <strong>separate I²C bus</strong> if your MCU has more than one I²C peripheral (many do) — simplest fix, costs an extra pair of GPIO pins. 2) Use an <strong>I²C multiplexer chip</strong> (e.g. a TCA9548A) between the MCU and the sensors — the mux itself has a unique address, and you select which downstream channel is active before each transaction, so only one sensor's address is "visible" on the shared bus at a time. (A few sensor families also support address bits set by tying a pin high/low — check the datasheet before assuming you need extra hardware.)</div>
      </details>
    </div>
    <pre><span class="cm">// STM32 HAL — the library handles ACK/NACK automatically</span>
HAL_I2C_Master_Transmit(&amp;hi2c1, slave_addr, tx_data, sizeof(tx_data), HAL_MAX_DELAY);
HAL_I2C_Master_Receive(&amp;hi2c1, slave_addr, rx_buf, sizeof(rx_buf), HAL_MAX_DELAY);</pre>
  `},
  { id:'4-4', title:'CAN Bus: Multi-Master Networking for Real Machines', body:`
    <p><strong>CAN</strong> (Controller Area Network) was built for automotive use and is now the default choice anywhere multiple boards on a real machine — a robot, a vehicle, an exoskeleton — need to talk reliably over distance, in electrically noisy environments, with no single point of failure. It's the protocol underneath most CAN-FD motor controller, BMS, and sensor-node communication you'll find on a robotics platform.</p>
    <h4>Differential signaling</h4>
    <p>CAN uses two wires, <strong>CAN_H</strong> and <strong>CAN_L</strong>, driven as a differential pair: a logic level is encoded as the <em>difference</em> between the two voltages, not either wire's absolute voltage. Electrical noise tends to affect both wires almost identically, so it largely cancels out when only the difference matters — this is what gives CAN its strong noise immunity over long cable runs, a property single-ended protocols like UART/SPI/I²C don't have.</p>
    <h4>Multi-master arbitration without collisions</h4>
    <p>Any node can start transmitting whenever the bus is idle — there's no single master granting permission. If two nodes start at the same instant, CAN resolves the conflict without corrupting either message, through bitwise arbitration on the message's <strong>identifier (ID)</strong>: a 0 bit is "dominant" and a 1 bit is "recessive," and if a node transmits recessive but reads dominant on the bus, it knows another node with a numerically lower ID is also transmitting, and it backs off immediately and silently — no message is lost, no collision occurs, and the lower-ID message simply continues uninterrupted. This is also why a lower CAN ID is, by design, a higher-priority message.</p>
    <h4>Built-in error handling</h4>
    <p>CAN nodes track their own error counts and can automatically demote themselves from active participation if they're causing persistent errors — a deliberate fault-containment feature that stops one malfunctioning node from being able to take down an entire bus shared by many others, which matters enormously on a vehicle or robot where one bad sensor board shouldn't be able to silence the whole network.</p>
    <p>Watch two nodes race for the bus below — enter two different IDs and see exactly which bit position decides the winner.</p>
  `, widget:'canBusSim' },
  { id:'4-5', title:'Choosing the Right Protocol', body:`
    <p>With four protocols covered, here's the decision table that interview "design a system" questions are usually testing for:</p>
    <table><tr><td>Need</td><td>Best fit</td><td>Why</td></tr>
      <tr><td>Simple point-to-point debug/console link</td><td>UART</td><td>Minimal wiring, simple to implement, no addressing needed</td></tr>
      <tr><td>High-throughput single sensor/display</td><td>SPI</td><td>Fastest of the four, simple full-duplex protocol</td></tr>
      <tr><td>Several low-speed sensors, minimal wiring</td><td>I²C</td><td>Built-in addressing scales to many devices on 2 wires</td></tr>
      <tr><td>Multiple boards across a noisy, longer-distance system</td><td>CAN</td><td>Differential signaling + arbitration + fault containment</td></tr></table>
    <p>None of these are mutually exclusive in one system — it's extremely common for a single board to use SPI for a fast IMU, I²C for a handful of slower sensors, UART for a debug console, and CAN to report up to the rest of the vehicle or robot, all at once. Part of the job is recognizing which constraint — speed, wire count, distance, noise, number of devices — actually dominates for a given link, rather than reaching for one protocol out of habit.</p>
  `},
] },

{ id:'u5', title:'Unit 5 — The Analog World', lessons:[
  { id:'5-1', title:'DAC: From Digital Numbers to Voltage', body:`
    <p>A <strong>Digital-to-Analog Converter (DAC)</strong> takes a binary number and produces a proportional voltage on a pin — the bridge that lets a microcontroller, which only knows discrete numbers, produce a continuously varying signal.</p>
    <p>An <em>n</em>-bit DAC divides its reference voltage into 2ⁿ discrete steps. A 12-bit DAC with a 3.3V reference has 4096 levels, so each step is about 0.8 mV.</p>
    <pre>output_voltage = (digital_value / (2^n - 1)) * v_ref
<span class="cm">// 12-bit DAC, value = 2048, v_ref = 3.3V → output ≈ 1.65 V</span></pre>
    <p>To generate a waveform rather than a fixed voltage, firmware writes a fast sequence of values tracing the desired shape — often timed by a hardware timer (Lesson 5.3) so the output frequency is exact rather than dependent on however fast the CPU happens to execute the loop, and frequently fed by DMA (Lesson 2.6) so the CPU isn't tied up writing every single sample by hand.</p>
    <pre><span class="cm">// STM32 HAL</span>
HAL_DAC_Start(&amp;hdac, DAC_CHANNEL_1);
HAL_DAC_SetValue(&amp;hdac, DAC_CHANNEL_1, DAC_ALIGN_12B_R, value);</pre>
  `},
  { id:'5-2', title:'ADC: Sampling, Resolution & Why Sample Rate Matters', body:`
    <p>An <strong>Analog-to-Digital Converter (ADC)</strong> does the reverse: measures a voltage and reports the closest representable digital number. This is how firmware reads anything continuous — a potentiometer, a temperature sensor, a strain gauge, an IMU's analog front end.</p>
    <h4>Sample-and-hold, and multiplexed channels</h4>
    <p>Most ADCs include a <strong>sample-and-hold</strong> circuit that briefly captures and freezes the input voltage right before conversion begins, so the value doesn't drift mid-measurement while the converter does its work. A single ADC block is often shared across several physical pins via an internal multiplexer — meaning if you're scanning multiple analog channels in sequence, each one effectively gets a smaller slice of total sampling time, a real constraint when reading several sensors fast.</p>
    <h4>Resolution and quantization error</h4>
    <p>Resolution sets how many discrete steps the ADC distinguishes. A real-world voltage falling between two representable levels gets rounded to the nearest one — unavoidable <strong>quantization error</strong>, the cost of converting something continuous into something discrete.</p>
    <h4>Sample rate and aliasing</h4>
    <p>The <strong>Nyquist–Shannon sampling theorem</strong> requires sampling at <em>more than twice</em> the highest frequency present in a signal to reconstruct it faithfully. Sample slower and high-frequency content doesn't disappear — it folds back down and impersonates a lower frequency that was never really there, an effect called <strong>aliasing</strong>. A wheel that appears to spin backward in old film footage is the same phenomenon: the camera's frame rate is the sample rate.</p>
    <p>Drag the sample-rate slider below below the signal's actual frequency and watch a real signal get aliased into a fake, slower-looking one.</p>
    <pre><span class="cm">// STM32 HAL — polling-based single conversion</span>
HAL_ADC_Start(&amp;hadc1);
HAL_ADC_PollForConversion(&amp;hadc1, HAL_MAX_DELAY);
uint32_t adc_value = HAL_ADC_GetValue(&amp;hadc1);
HAL_ADC_Stop(&amp;hadc1);</pre>
  `, widget:'adcSim' },
  { id:'5-3', title:'Timers & PWM', body:`
    <p>A hardware <strong>timer</strong> is a peripheral that counts clock pulses independently of the CPU and can trigger an action — an interrupt, a pin toggle — when the count hits a target, without the CPU babysitting it in a loop. Timers underpin precise timing in firmware: elapsed-time measurement, periodic interrupts, and one of the most common embedded outputs, <strong>PWM</strong>.</p>
    <p><strong>Pulse-Width Modulation</strong> approximates an analog voltage using only a digital on/off pin, by switching it on and off fast and varying the fraction of time spent on — the <strong>duty cycle</strong>. A slow-responding downstream system (an LED's perceived brightness, a motor's speed, a low-pass filter) effectively averages that fast switching into something that behaves like a smooth analog level, without needing an actual DAC.</p>
    <pre>duty_cycle = time_high / total_period
<span class="cm">// 25% duty  → dim LED / slow motor</span>
<span class="cm">// 75% duty  → bright LED / fast motor</span>
<span class="cm">// 100% duty → fully on, same as a plain digital HIGH</span></pre>
    <p>A timer generates PWM by counting up to a fixed period and comparing against a separate "compare" value each cycle: pin is high while the count is below the compare value, low above it. Change the compare value and you change the duty cycle, with the timer hardware doing all the switching with zero CPU involvement per cycle.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A timer's period register is set to 999 (counts 0–999, so 1000 steps total). You want a 30% duty cycle. What value goes in the compare register? Then: you measure the LED and it's barely dimming even though the duty cycle calculation looks right — what's the single most likely cause if the PWM frequency itself is set far too low (say, 2 Hz)?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">Compare = 0.30 × 1000 = <strong>300</strong>. At 2 Hz, the on/off switching is slow enough for the human eye (and most physical systems) to perceive as distinct blinking rather than a smoothly averaged brightness — PWM's "looks analog" trick relies on switching much faster than whatever is observing it can respond to. The fix is raising the PWM frequency (hundreds of Hz to kHz for LEDs; the right value depends on what's downstream — a motor's mechanical inertia tolerates lower frequencies than the human eye does).</div>
      </details>
    </div>
  `, widget:'pwmSim' },
  { id:'5-4', title:'Signal Conditioning & Filtering', body:`
    <p>Real sensors rarely produce a signal an ADC can read directly and cleanly. <strong>Signal conditioning</strong> is the analog circuitry between a sensor and the MCU pin that fixes that.</p>
    <h4>Voltage dividers and op-amps</h4>
    <p>A simple <strong>voltage divider</strong> (two resistors in series) scales a voltage down into the MCU's safe input range — necessary whenever a sensor's native output range exceeds what the ADC can tolerate. An <strong>op-amp</strong> configured as a <strong>buffer</strong> isolates a high-impedance sensor from the ADC's own loading effects without changing the voltage at all; configured as an <strong>amplifier</strong>, it boosts a weak signal (a thermocouple's microvolt-scale output, for instance) up to a range the ADC can resolve meaningfully against its quantization step (Lesson 5.2) — without amplification first, a tiny signal might only move the ADC reading by a handful of counts across its entire useful range.</p>
    <h4>Anti-aliasing filters</h4>
    <p>Lesson 5.2 covered aliasing as a sampling-rate problem, but it's also fixed in analog, before the ADC ever sees the signal: a simple <strong>low-pass RC filter</strong> (a resistor and capacitor) placed ahead of the ADC input attenuates frequencies above the Nyquist limit, so there's nothing left to fold back and alias even if a stray high-frequency noise spike sneaks onto the line. Production sensor front-ends almost always pair a hardware anti-aliasing filter with an appropriately chosen sample rate — relying on sample rate alone is fragile against noise the designer didn't anticipate.</p>
    <div class="callout"><div class="callout-label">Where this connects back</div>This is the same RC low-pass idea, just applied to continuous noise instead of mechanical bounce, as the timer-based debounce window from Lesson 3.5 — "filter out the fast stuff you don't trust, keep the slow stuff you do" is a pattern that recurs across the analog and digital sides of this field equally.</div>
  `},
  { id:'5-5', title:'PID Controllers: Closing the Loop', body:`
    <p>A PID controller is the most common way firmware turns "where I am" and "where I want to be" into a continuous, well-behaved correction signal — driving a motor's PWM duty cycle to hold a position, a heater's output to hold a temperature, or a drone's motor speeds to hold an attitude. It's the practical, working version of the abstract sense → decide → actuate loop from Lesson 1.1.</p>
    <h4>The pieces</h4>
    <p>The <strong>reference</strong> is the desired value (target position); the <strong>plant output</strong> is the actual, measured value (current position, read via Unit 4/5's sensors); the <strong>error</strong> is simply <code>reference − output</code>. A PID controller turns that error into a correction signal — commonly a PWM duty cycle (Lesson 5.3) — using three weighted terms added together:</p>
    <table><tr><td>Term</td><td>Formula</td><td>What it does</td><td>Effect of increasing its gain</td></tr>
      <tr><td style="color:var(--cyan);">Proportional (P)</td><td>error × Kp</td><td>Responds to current error — the bigger the error, the bigger the correction</td><td>Faster response, but too high causes oscillation/instability</td></tr>
      <tr><td style="color:var(--cyan);">Integral (I)</td><td>(running sum of error × dt) × Ki</td><td>Accumulates persistent error over time and adds extra correction</td><td>Eliminates steady-state error, but too high causes overshoot and slow oscillation</td></tr>
      <tr><td style="color:var(--cyan);">Derivative (D)</td><td>(rate of change of error) × Kd</td><td>Reacts to how fast the error is changing, damping the response</td><td>Reduces overshoot and smooths the response, but amplifies sensor noise if too high</td></tr></table>
    <h4>Implementation</h4>
    <p>A PID loop is almost always implemented as a small function called on a fixed period, tracking just two pieces of state between calls — the previous error, and the running integral sum:</p>
    <pre><span class="ty">float</span> prev_error = 0, integral = 0, prev_time = 0;

<span class="ty">float</span> pid_update(<span class="ty">float</span> reference, <span class="ty">float</span> measured, <span class="ty">float</span> time) {
  <span class="ty">float</span> error = reference - measured;
  <span class="ty">float</span> dt = time - prev_time;

  <span class="ty">float</span> P = Kp * error;
  integral += error * dt;
  <span class="ty">float</span> I = Ki * integral;
  <span class="ty">float</span> D = Kd * (error - prev_error) / dt;

  prev_error = error;
  prev_time = time;
  <span class="kw">return</span> P + I + D;   <span class="cm">// feed this straight into your PWM compare register (Lesson 5.3)</span>
}</pre>
    <h4>Response characteristics — the vocabulary you'll be asked about</h4>
    <ul>
      <li><strong>Rise time</strong> — how fast the output moves from one threshold of the target value to another.</li>
      <li><strong>Overshoot</strong> — how far the response swings past the target before settling, usually expressed as a percentage of the final value.</li>
      <li><strong>Settling time</strong> — how long until the response stays within some acceptable band of the target.</li>
      <li><strong>Steady-state error</strong> — the persistent gap between output and reference once the system has settled, which the integral term exists specifically to drive toward zero.</li>
    </ul>
    <h4>Integral windup — a real, frequently-tested failure mode</h4>
    <p>If the actuator is saturated or disabled for a while (a motor driver turned off, an output clamped at its maximum) while a steady error persists, the integral term keeps accumulating the entire time — because nothing in the basic formula above knows the actuator isn't actually able to respond. The moment the actuator becomes active again, that pent-up integral sum unloads all at once as a huge correction, producing a large, often dangerous overshoot. The standard fix is <strong>clamping the integral term</strong> to a sane maximum, or freezing integral accumulation entirely whenever the output is known to be saturated.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A position-control PID overshoots badly on every large step change but tracks smoothly once it's close to target. Which single gain would you try lowering first, and which would you try raising, to address the overshoot specifically without sacrificing the steady-state accuracy you're already getting?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">Try lowering <strong>Kp</strong> first (it's the term most directly responsible for an aggressive, overshooting response to a large error) and/or raising <strong>Kd</strong> (the derivative term specifically damps overshoot by reacting to how fast the error is closing). Leave <strong>Ki</strong> alone for this specific symptom — it governs steady-state accuracy once you're already near target, which the problem states is already working fine; changing it risks reintroducing steady-state error without addressing the actual overshoot.</div>
      </details>
    </div>
  `},
] },

{ id:'u6', title:'Unit 6 — Systems & RTOS', lessons:[
  { id:'6-1', title:'Real-Time Constraints', body:`
    <p>"Real-time" does not mean "fast" — it means <strong>predictably on time</strong>, against a deadline that matters to correctness, not just user experience. A system can be objectively slow and still be real-time, as long as it's reliably slow by the same predictable amount every time.</p>
    <ul>
      <li><strong>Hard real-time</strong>: missing a deadline is a system failure, full stop. An airbag controller responding 50ms late has, functionally, not responded at all.</li>
      <li><strong>Soft real-time</strong>: missing a deadline degrades quality but isn't catastrophic — a dropped video frame is bad, not dangerous.</li>
    </ul>
    <ul>
      <li><strong>Jitter</strong> — variation in when an event actually happens relative to when it was supposed to. A 1ms control loop firing anywhere from 0.9–1.3ms has high jitter, and that variability alone can destabilize a control algorithm even if average timing looks fine.</li>
      <li><strong>WCET (Worst-Case Execution Time)</strong> — the longest a piece of code could possibly take, accounting for every branch and every interrupt that could interleave with it. Real-time systems are designed around WCET, not average-case time, because the one time it runs slow is the time that matters.</li>
    </ul>
    <div class="callout"><div class="callout-label">Why this connects to earlier units</div>This is the formal version of the constraint from Lesson 1.1 — and the reason ISRs stay short (3.2), interrupt priorities exist (3.3), and control loops are timed by hardware timers instead of approximate delay loops.</div>
  `},
  { id:'6-2', title:'RTOS Basics: Tasks and Scheduling', body:`
    <p>So far, every example assumed one single <code>while(1)</code> main loop doing everything, with interrupts occasionally cutting in. That works for simple systems, but gets unwieldy once several genuinely independent jobs run at different rates — sampling a sensor every 1ms, updating a display every 100ms, blinking a status LED every second — all sharing one CPU.</p>
    <p>A <strong>Real-Time Operating System (RTOS)</strong> — FreeRTOS is by far the most common on small MCUs — solves this by letting each job become its own independent <strong>task</strong>, each with its own stack, and a <strong>scheduler</strong> that decides, many times a second, which task gets the CPU right now.</p>
    <ul>
      <li>Each task has a <strong>priority</strong>. The scheduler always runs the highest-priority task that's ready to run.</li>
      <li>A <strong>context switch</strong> is the scheduler pausing one task (saving registers and stack pointer) and resuming another — conceptually the same save/restore mechanism as an interrupt, just driven by the scheduler's own timer.</li>
      <li>Tasks waiting on something — a timer, a sensor, a message from another task — are <strong>blocked</strong> and consume no CPU until whatever they're waiting for arrives.</li>
    </ul>
    <h4>Preemptive vs. cooperative scheduling</h4>
    <p>In a <strong>preemptive</strong> scheduler (what FreeRTOS uses by default), a higher-priority task that becomes ready will interrupt a lower-priority task immediately, mid-instruction-stream — the same forced-preemption idea as interrupt nesting (Lesson 3.3), one layer up. In a <strong>cooperative</strong> scheduler, a task keeps the CPU until it voluntarily yields, which is simpler to reason about (no mid-function preemption to worry about) but means one badly-behaved task can starve everything else indefinitely — a tradeoff worth knowing even though preemptive is the practical default in almost all modern embedded RTOSes.</p>
    <p>Watch the simulated scheduler below run three tasks at three different priorities and periods, and see exactly when each one gets the CPU.</p>
  `, widget:'rtosSim' },
  { id:'6-3', title:'FreeRTOS in Practice: Queues, Semaphores & ISR-Safe APIs', body:`
    <p>Tasks rarely work in total isolation — they need to pass data and coordinate with each other and with ISRs. FreeRTOS (and RTOSes generally) provide a small set of primitives for exactly this.</p>
    <h4>Queues</h4>
    <p>A <strong>queue</strong> is a fixed-size, thread-safe FIFO buffer for passing data between tasks (or from an ISR to a task) without either side needing to manage locking manually. A producer task or ISR pushes data on; a consumer task blocks until something arrives, then pops it off — the cleanest way to hand sensor samples from a fast producer to a slower processing task without losing data or racing on shared memory.</p>
    <pre>xQueueSend(sensor_queue, &amp;new_sample, 0);          <span class="cm">// from a task</span>
xQueueSendFromISR(sensor_queue, &amp;new_sample, NULL); <span class="cm">// from an ISR — note the different API</span></pre>
    <h4>Semaphores vs. mutexes — the distinction interviewers actually probe</h4>
    <p>A <strong>binary semaphore</strong> is a signaling mechanism: one task or ISR "gives" it, another task "takes" it, most commonly used to wake a task the instant an event occurs (an ISR gives a semaphore the moment data is ready; a task blocked taking that semaphore wakes immediately). A <strong>mutex</strong> looks similar in API but means something different: it protects a shared resource through mutual exclusion, and critically, has the concept of <strong>ownership</strong> — only the task that took a mutex is meant to give it back, and many RTOS mutex implementations support <strong>priority inheritance</strong> specifically to address priority inversion (covered next). Using a binary semaphore where you actually need ownership semantics is a real, commonly-tested mistake.</p>
    <h4>Task notifications</h4>
    <p>A lighter-weight alternative to a full queue or semaphore when you only need to signal one specific, known task — each task has a built-in 32-bit notification value the scheduler manages directly, with lower overhead than a separate semaphore object. The tradeoff: notifications are one-to-one (a queue or semaphore can have multiple senders/waiters), so they fit best when exactly one task needs to wake up another.</p>
    <h4>Stack sizing per task</h4>
    <p>Because each task has its own stack carved out of a fixed total RAM budget, sizing it correctly matters in both directions: too small risks the stack-overflow corruption from Lesson 1.5 (now per-task instead of system-wide); too generous wastes RAM that's almost always scarce. FreeRTOS provides a "high water mark" check per task specifically so this can be tuned empirically rather than guessed.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>You need a button-press ISR to wake a single dedicated "handle button" task as fast as possible, with the absolute minimum overhead. Which primitive from this lesson fits best — a queue, a binary semaphore, a mutex, or a task notification — and why do the other three fit worse?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">A <strong>task notification</strong> is the best fit: exactly one ISR signaling exactly one known task, with the lowest overhead of the four options. A queue is overkill — you're not actually passing data, just a wake-up signal. A binary semaphore would also work functionally but carries more overhead than a notification for this one-to-one case. A mutex is wrong on a conceptual level here — it protects a shared resource and implies ownership/give-back semantics, not a one-shot "wake up now" event.</div>
      </details>
    </div>
  `},
  { id:'6-4', title:'Concurrency Hazards: Races and Priority Inversion', body:`
    <p>The instant more than one task — or even just one task and one ISR — touches the same piece of data, you've created the possibility of a <strong>race condition</strong>: the outcome depends on the precise, unpredictable timing of which one runs when.</p>
    <pre><span class="cm">// shared between main loop and an ISR — classic race</span>
<span class="kw">volatile int</span> sample_count = 0;

<span class="cm">// in the ISR:</span>
sample_count++;  <span class="cm">// NOT atomic on most MCUs: read, add 1, write — 3 separate steps</span>
<span class="cm">// if the ISR fires mid-increment from the main loop, an increment can be lost</span></pre>
    <p>A <strong>mutex</strong> is the standard fix (Lesson 6.3): a task must take it before touching shared data and give it back when done, and the RTOS guarantees only one task holds it at a time.</p>
    <p>Mutexes introduce their own classic failure mode worth knowing by name: <strong>priority inversion</strong>. A low-priority task takes a mutex; a high-priority task needs that same mutex and has to wait; but a medium-priority task — needing neither — keeps preempting the low-priority task, so the low-priority task never finishes and never releases the lock the high-priority task is waiting on. The net effect: a high-priority task is effectively blocked by a medium-priority one that has nothing to do with it. This exact bug nearly doomed the Mars Pathfinder mission in 1997, and is the practical reason most production RTOSes implement <strong>priority inheritance</strong> — temporarily boosting the low-priority task's priority while it holds a mutex someone more important is waiting on, exactly long enough to let it finish and release the lock.</p>
  `},
  { id:'6-5', title:'POSIX Threads, Mutexes & Semaphores: The Same Ideas at the OS Level', body:`
    <p>Lessons 6.2&ndash;6.4 covered concurrency from inside an RTOS task scheduler. The exact same underlying problems &mdash; shared data, mutual exclusion, signaling between concurrent contexts &mdash; show up again, with concrete OS-provided APIs, the moment you're writing multi-threaded C against a full operating system instead of bare metal: embedded Linux, a host-side test harness, or any tooling that runs on your development machine rather than the target MCU. Knowing the POSIX threading API (<strong>pthreads</strong>) by name is worth it both for embedded Linux roles and because it makes the abstract RTOS concepts concrete with real, runnable code.</p>
    <h4>Creating and joining threads</h4>
    <p>A thread's entry function always has the same shape: it takes a single <code>void*</code> (an envelope for arbitrary argument data, cast back to its real type as the first line &mdash; the same <code>void*</code> pattern as Lesson 1.10) and returns a <code>void*</code> result.</p>
    <pre><span class="cm">#include</span> &lt;pthread.h&gt;

<span class="ty">void</span>* worker(<span class="ty">void</span>* arg) {
  <span class="ty">int</span>* num = (<span class="ty">int</span>*)arg;          <span class="cm">// cast the void* envelope back to its real type</span>
  printf(<span class="st">"got: %d\\n"</span>, *num);
  <span class="kw">return</span> NULL;                  <span class="cm">// or malloc a result for the caller to receive via pthread_join</span>
}

<span class="ty">int</span> main() {
  pthread_t t1;
  <span class="ty">int</span> num1 = 3;
  pthread_create(&amp;t1, NULL, worker, (<span class="ty">void</span>*)&amp;num1);  <span class="cm">// spawns the thread, runs concurrently</span>

  <span class="ty">void</span>* result;
  pthread_join(t1, &amp;result);   <span class="cm">// blocks main until t1 finishes; result receives whatever worker() returned</span>
  <span class="kw">return</span> 0;
}</pre>
    <p>One real footgun worth flagging by name: passing the address of a stack variable from the spawning function into a thread is only safe if the spawning function is guaranteed to outlive the thread &mdash; <code>pthread_join</code> enforces exactly that guarantee here, but if <code>main</code> could return or the variable could go out of scope before the thread reads it, that's the same dangling-pointer bug from Lesson 1.10, just across threads instead of across a function return.</p>
    <h4>Mutexes: the pthread API for Lesson 6.4's mutual exclusion</h4>
    <pre>pthread_mutex_t mutex;                       <span class="cm">// usually file-scope/global so every thread can reach it</span>
pthread_mutex_init(&amp;mutex, NULL);

<span class="cm">// in any thread:</span>
pthread_mutex_lock(&amp;mutex);
  <span class="cm">// critical section &mdash; only one thread is ever in here at a time</span>
pthread_mutex_unlock(&amp;mutex);

<span class="cm">// once every thread holding/using it has been joined back:</span>
pthread_mutex_destroy(&amp;mutex);</pre>
    <p>The behavior is the same mutual-exclusion guarantee as a FreeRTOS mutex (Lesson 6.3) &mdash; the difference is what happens to a thread that can't get the lock: by default it's put to sleep by the OS scheduler (a real context switch happens, the CPU goes and does other work) rather than spinning, which is the right default for any critical section that might be held for more than a few instructions.</p>
    <h4>Spinlocks: trading sleep for speed on very short critical sections</h4>
    <p>A <strong>spinlock</strong> takes the opposite approach: instead of sleeping when the lock is unavailable, the waiting thread sits in a tight loop actively re-checking the lock ("spinning") until it's free. This avoids the overhead of a full context switch (save registers, schedule something else, switch back later) &mdash; a real win if the lock is typically held for only a few instructions, since the context-switch overhead alone could exceed the actual wait. The cost is the opposite of a sleeping mutex: a spinning thread burns 100% of a CPU core the entire time it waits, doing no useful work.</p>
    <div class="callout warn"><div class="callout-label">The single-core trap</div>On a single-core CPU, a spinlock can cause genuine CPU starvation: the spinning thread never voluntarily yields the core, so the thread that's actually holding the lock and could release it never gets scheduled to run and finish. This is exactly why spinlocks are normally reserved for kernel-space code on multi-core systems with very short critical sections &mdash; in user-space application code with unpredictable scheduling, a sleeping mutex is almost always the safer default.</p>
    <h4>Semaphores: a counting primitive, not just a lock</h4>
    <p>A <strong>mutex</strong> only ever has one holder. A <strong>semaphore</strong> is initialized with a count <code>N</code> and allows up to <code>N</code> concurrent holders &mdash; the natural fit whenever a resource exists in multiple identical, interchangeable copies (a pool of <code>N</code> hardware DMA channels, <code>N</code> open connections to a peripheral) rather than exactly one.</p>
    <pre><span class="cm">#include</span> &lt;semaphore.h&gt;
sem_t sem;
sem_init(&amp;sem, 0, 3);   <span class="cm">// 0 = shared between threads in this process; 3 = 3 interchangeable resources available</span>

sem_wait(&amp;sem);   <span class="cm">// decrements; blocks here once the count hits 0 until another thread posts</span>
  <span class="cm">// use one of the 3 resources</span>
sem_post(&amp;sem);   <span class="cm">// increments; wakes a thread blocked in sem_wait, if any are waiting</span>

sem_destroy(&amp;sem);</pre>
    <p>The deeper distinction from a mutex isn't just the count &mdash; it's that a semaphore has <strong>no ownership</strong>. Any thread (or an ISR) can call <code>sem_post</code>, even one that never called <code>sem_wait</code>, which is exactly what makes a semaphore the right tool for <em>signaling</em> ("an event happened") rather than only for protecting a resource &mdash; a mutex, by contrast, is generally expected to be unlocked only by whoever locked it.</p>
    <h4>Four classic semaphore patterns worth recognizing by shape</h4>
    <p>The same primitive (<code>wait</code>/<code>post</code>, i.e. decrement/increment-and-wake) solves several visibly different coordination problems depending only on the initial count and which task calls which operation:</p>
    <ul>
      <li><strong>Sequencing</strong> (semaphore starts at 0): one task <code>wait</code>s for an event; another task <code>post</code>s once it has actually happened. Guarantees the first task never proceeds before the event &mdash; the same shape as an ISR posting a semaphore the instant data arrives, and a task blocked on that semaphore waking immediately (Lesson 6.3).</li>
      <li><strong>Mutual exclusion</strong> (semaphore starts at 1): <code>wait</code>, critical section, <code>post</code> &mdash; functionally a mutex, built from a semaphore instead.</li>
      <li><strong>Rendezvous</strong> (two semaphores, both start at 0): two tasks must each reach a specific point before <em>either</em> is allowed to continue past it. Each task <code>post</code>s its own semaphore once, then <code>wait</code>s on the other task's semaphore &mdash; neither can pass until both have arrived.</li>
      <li><strong>Barrier synchronization</strong> (one semaphore per task, all start at 0): the general form of a rendezvous for <code>n</code> tasks. Each task <code>post</code>s its <em>own</em> semaphore <code>n&minus;1</code> times (once for every other task that needs to pass it) and <code>wait</code>s once on each of the <em>other</em> <code>n&minus;1</code> semaphores. The net effect: no task gets past the barrier until all <code>n</code> have arrived at it &mdash; a pattern that shows up whenever several independent worker threads must all finish one phase of work before any of them is allowed to start the next.</li>
    </ul>
    <h4>Atomics: a lock-free alternative for simple operations</h4>
    <p>For an operation as simple as incrementing a shared counter, a full mutex can be more machinery than necessary. C11's <code>_Atomic</code> qualifier guarantees a variable's reads/modifies/writes happen as one indivisible hardware operation, with no critical section or sleeping/spinning involved at all:</p>
    <pre>_Atomic <span class="ty">uint32_t</span> counter = 0;
counter++;   <span class="cm">// guaranteed atomic &mdash; no lock needed, no two threads can interleave mid-increment</span></pre>
    <p>This is a sharper, lower-overhead version of the <code>volatile</code> discussion from Lesson 6.4's exercise: recall that <code>volatile sample_count++</code> there was <em>not</em> safe, because <code>volatile</code> only stops the compiler from caching a stale value &mdash; it says nothing about the read-modify-write sequence being uninterruptible. <code>_Atomic</code> is the tool that actually closes that gap for simple counter-style updates, without reaching for a full mutex.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>Three worker threads share access to a pool of two identical hardware accelerator units &mdash; at most two threads may be actively using an accelerator at the same time, and it doesn't matter which two. Which primitive from this lesson fits best: a mutex, a spinlock, or a semaphore &mdash; and what initial value would you give it?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">A <strong>semaphore initialized to 2</strong>. A mutex only ever allows one holder, which is too restrictive here since two threads are genuinely allowed to run concurrently. A spinlock is about <em>how</em> a thread waits (busy vs. asleep), not about how many holders are allowed at once, and is the wrong dimension to reach for here. A semaphore initialized to the actual resource count is exactly the "N interchangeable resources" pattern it exists for: each thread calls <code>sem_wait</code> before using an accelerator (blocking once both are in use) and <code>sem_post</code> once it's done, with no ownership tracking required since any of the three threads releasing one accelerator is equally valid.</div>
      </details>
    </div>
  `},
] },

{ id:'u7', title:'Unit 7 — Memory, Storage & Firmware Updates', lessons:[
  { id:'7-1', title:'Flash & EEPROM: How Non-Volatile Memory Actually Works', body:`
    <p>Unlike RAM, flash and EEPROM retain data with no power applied — but the mechanism that makes that possible also makes them behave very differently from RAM in ways that matter directly to firmware design.</p>
    <h4>Erase before write</h4>
    <p>Flash memory can only be written from 1 to 0 a bit at a time; flipping a bit back from 0 to 1 requires <strong>erasing</strong> an entire block at once — typically several kilobytes — not a single byte. This is why flash-based storage (a settings page, a logging buffer) is almost always managed in fixed-size erase blocks, and why "just update one byte" in flash is, underneath, "erase the whole block, then rewrite everything including the one changed byte."</p>
    <h4>Write endurance and wear leveling</h4>
    <p>Each erase/write cycle physically degrades the flash cell, and a typical cell is only rated for somewhere in the range of 10,000–100,000 cycles before it becomes unreliable. A naive design that always writes the same address (a counter incremented once a second, say) could wear out that one block in hours. <strong>Wear leveling</strong> spreads writes across many physical blocks instead of reusing the same one — rotating through a pool of blocks and tracking which is "current" — so the storage as a whole lasts the device's intended lifetime instead of failing in one hot spot almost immediately.</p>
    <h4>EEPROM vs. flash</h4>
    <p>EEPROM is byte-addressable and erasable in smaller granularity than flash, but is typically smaller in capacity and slower per write — many MCUs use a section of flash <em>emulating</em> EEPROM behavior in software (writing log-structured records and tracking the latest valid one) specifically to get byte-level update convenience without dedicating separate physical EEPROM silicon.</p>
    <div class="callout warn"><div class="callout-label">Practical consequence</div>"How many writes per second can this setting realistically tolerate over the product's 10-year life?" is a real design question, not a hypothetical — and it's exactly the kind of constraint that separates "I can write embedded C" from "I can design an embedded system that survives in the field."</div>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A product logs a sensor reading to flash once per second, 24/7, always to the same fixed address, and is rated to last 5 years in the field. The flash is rated for 100,000 erase/write cycles per block. Roughly how many days until that block wears out, and what's the one-sentence fix?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">86,400 writes/day ÷ 100,000 cycle rating ≈ <strong>just over 1 day</strong> before that block is past its rated endurance — nowhere close to a 5-year product life. The fix is wear leveling: rotate writes across a pool of blocks (or use a log-structured / ring-buffer scheme that always writes to the next free slot and wraps around) instead of rewriting one fixed address.</div>
      </details>
    </div>
  `},
  { id:'7-2', title:'Bootloaders & Firmware Updates (OTA/DFU)', body:`
    <p>A <strong>bootloader</strong> is a small, separate piece of firmware that runs first on every power-up, before your main application — its job is to decide whether to jump straight into the main application or instead accept a new firmware image and write it into flash. It's the mechanism that makes field firmware updates possible on a device with no removable storage and no factory reprogramming visit.</p>
    <h4>Dual-bank / A-B update schemes</h4>
    <p>A common, much safer pattern reserves two full application slots in flash — "Bank A" and "Bank B." A new firmware image is written entirely into the inactive bank while the device keeps running normally out of the active one; only once the new image is fully written and verified does the bootloader switch which bank it treats as active on the next boot. This means a failed or interrupted update (power loss mid-write, corrupted transfer) never leaves the device in a half-written, unbootable state — the previously-working bank is untouched the entire time.</p>
    <h4>Fail-safe design and rollback</h4>
    <p>Production update systems typically pair this with a "first boot" health check: the new firmware must prove it's actually working — for instance, by successfully completing some self-test or checking in with a server — within a short window after switching banks, or the bootloader automatically <strong>rolls back</strong> to the previous known-good bank on the next reset. Without this, a firmware image that compiles and flashes fine but has a fatal logic bug can permanently brick every device in the field the moment the update ships — exactly the failure mode dual-bank-plus-rollback exists to prevent.</p>
    <h4>DFU vs. OTA</h4>
    <p><strong>DFU</strong> (Device Firmware Update) usually refers to a wired update over USB or a debug interface; <strong>OTA</strong> (Over-The-Air) means the new image arrives wirelessly — Wi-Fi, BLE, cellular. The bank-switching and rollback logic underneath is largely the same regardless of transport; what differs is how the image gets into the inactive bank in the first place, and OTA introduces its own concerns (Unit 8: is this firmware image actually authentic, and was it actually meant for this device?).</p>
  `},
] },

{ id:'u8', title:'Unit 8 — Reliability, Safety & Testing', lessons:[
  { id:'8-1', title:'Defensive Firmware: Brown-Out Reset, Hard Faults & Asserts', body:`
    <p>Beyond the watchdog timer (Lesson 2.5), production firmware leans on several other hardware and software safety nets, because in the field, almost every assumption eventually gets violated.</p>
    <h4>Brown-out reset</h4>
    <p>If supply voltage dips below the level the chip needs to operate reliably — a weak battery, a noisy power rail, a motor's inrush current sagging the supply — logic can behave unpredictably, including silently corrupting flash mid-write. A <strong>brown-out detector</strong> is dedicated hardware that monitors supply voltage and forces a clean reset the instant it drops below a safe threshold, rather than letting the chip limp along into undefined, potentially corrupting behavior.</p>
    <h4>Hard fault handlers</h4>
    <p>ARM Cortex-M cores raise a <strong>HardFault</strong> exception automatically on serious errors — dereferencing a null or invalid pointer, executing from an illegal address, an unaligned memory access on a core that forbids it. A well-built application installs its own hard fault handler that, at minimum, captures the CPU state at the moment of the fault (the faulting address and the contents of key registers) to non-volatile memory or a debug log before resetting — turning an otherwise untraceable "it just rebooted, no idea why" field failure into something you can actually diagnose afterward.</p>
    <h4>Asserts</h4>
    <p>An <code>assert()</code> checks an assumption that should always be true and halts (or logs and resets) immediately if it isn't — deliberately failing loud and fast in development rather than letting a violated assumption silently propagate into corrupted state three function calls later, where it's far harder to trace back to its actual cause. Many teams compile asserts out of release builds for performance, but log the firing condition somewhere recoverable when they do trip in the field — the debugging value of "exactly which assumption broke, and where" is hard to overstate.</p>
    <div class="callout"><div class="callout-label">The throughline</div>Every mechanism in this lesson shares one philosophy: assume something will eventually go wrong that you didn't anticipate, and build a deliberate, predictable response to it — rather than hoping it never happens, or worse, never noticing when it does.</div>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A device in the field reboots itself roughly once a week with no error reported. You have a hard fault handler installed but it only resets the chip — it doesn't log anything before doing so. Name two specific things you'd add to actually diagnose this, and explain why "just reset" alone makes the bug nearly undebuggable.</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer">1) Have the hard fault handler capture the faulting program counter, the link register, and a stack snapshot, and write that to a small reserved region of RAM or flash that survives reset (a non-volatile "crash log") before resetting. 2) On the next boot, check that region and report it (over UART, to a log, to a server on the next OTA check-in) so you can map the address back to a line of code with the build's symbol table. Without either, every reset looks identical from the outside — there's no way to tell a brown-out, a stack overflow, and a null-pointer dereference apart after the fact, because "reset" erases exactly the evidence you'd need to distinguish them.</div>
      </details>
    </div>
  `},
  { id:'8-2', title:'Testing Embedded Code: Unit Tests, HIL, and Static Analysis', body:`
    <p>Testing firmware is harder than testing application code for a structural reason: the code under test is often inseparable from the hardware it talks to. The field has converged on a few complementary strategies rather than one solution.</p>
    <h4>Hardware Abstraction for testability</h4>
    <p>Code that calls hardware-specific functions directly (<code>GPIOA-&gt;ODR |= ...</code> scattered through business logic) is nearly impossible to unit test on a laptop. The fix is the same one used everywhere else in software: introduce a thin abstraction layer (a HAL or simple interface) between your logic and the hardware, then substitute a <strong>mock</strong> implementation of that layer in tests — letting the actual decision logic (a control algorithm, a state machine's transition rules) run and be verified on a development machine, fast, with no board attached at all.</p>
    <pre><span class="cm">// logic depends on an interface, not the hardware directly</span>
<span class="ty">bool</span> should_open_valve(<span class="ty">SensorInterface</span> *sensor) {
  <span class="kw">return</span> sensor-&gt;read_pressure() &gt; THRESHOLD;
}
<span class="cm">// tests substitute a fake SensorInterface returning known values</span></pre>
    <h4>Hardware-in-the-Loop (HIL) testing</h4>
    <p>Unit tests with mocked hardware verify your logic, but not whether your logic correctly drives the <em>real</em> peripherals, with real timing, real electrical behavior, real edge cases a mock can't anticipate. <strong>HIL testing</strong> runs the actual compiled firmware on actual target hardware, but with real-world inputs and outputs replaced by a test rig that can inject precise, repeatable signals (a simulated sensor fault, a precisely-timed CAN message, a brown-out event) and automatically check the firmware's response — the standard way safety-relevant embedded systems get continuous, automated regression testing against real silicon rather than relying on manual bench testing alone.</p>
    <h4>Static analysis and MISRA-C</h4>
    <p><strong>Static analysis</strong> tools scan source code without running it, flagging patterns known to cause real bugs — uninitialized variables, suspicious implicit type conversions, unreachable code, certain classes of buffer overrun. <strong>MISRA-C</strong> is a widely-adopted coding standard, originally from the automotive industry, that restricts C to a safer, more predictable subset — banning or constraining constructs known to be error-prone or behaviorally ambiguous across compilers (certain pointer arithmetic patterns, implicit type conversions, unbounded recursion) — and static analyzers are commonly configured to enforce it automatically as part of a build. You'll see MISRA-C referenced constantly in automotive, medical, and aerospace firmware job postings specifically.</p>
  `},
  { id:'8-3', title:'Functional Safety Basics: Why Some Industries Need Certified Process', body:`
    <p>In safety-relevant industries, "we tested it and it worked" isn't sufficient evidence on its own — regulators and customers require a documented, auditable <strong>process</strong> proving the development methodology itself reduces risk to an acceptable level, not just that the shipped artifact happened to pass its tests.</p>
    <ul>
      <li><strong>ISO 26262</strong> — automotive functional safety. Defines <strong>ASIL</strong> levels (A through D, D being most stringent) based on the severity, exposure, and controllability of a potential hazard, and prescribes process rigor — requirements traceability, specific testing coverage, redundancy — scaled to that level.</li>
      <li><strong>IEC 61508</strong> — the general industrial functional safety standard most sector-specific standards (including ISO 26262) are derived from, using analogous <strong>SIL</strong> (Safety Integrity Level) ratings.</li>
      <li><strong>DO-178C</strong> — aerospace software, with its own rigor levels (DAL A through E) tied to failure-condition severity.</li>
      <li><strong>IEC 62304</strong> — medical device software, directly relevant given your medical biophysics background — defines software safety classes (A, B, C) and required process artifacts scaled to risk, much the same shape as the others.</li>
    </ul>
    <h4>Redundancy as a core safety pattern</h4>
    <p>A recurring theme across all of these standards: for sufficiently severe hazards, a single point of failure — one sensor, one MCU, one code path — usually isn't acceptable. Common patterns include dual-redundant sensors with a voting or plausibility-check scheme between them, a separate independent safety MCU that can override the primary controller, and watchdog-style monitors (Lesson 2.5, generalized) that verify the main system is behaving sanely and can force a safe state if it isn't.</p>
    <div class="callout violet"><div class="callout-label">Why this is worth knowing even outside regulated industries</div>You don't need to memorize ASIL tables to benefit from this mental model. "What's the failure mode if this single sensor reads garbage? What's the failure mode if this one MCU locks up?" is a genuinely useful design question for any control system, exoskeleton firmware included — and being able to talk about it fluently is a real interview signal, not just regulatory trivia.</div>
  `},
] },

{ id:'u9', title:'Unit 9 — Tooling, Workflow & Security', lessons:[
  { id:'9-1', title:'Build Systems & Version Control for Firmware', body:`
    <p>The tools around the code matter almost as much as the code itself once a project grows past a single person and a single board revision.</p>
    <h4>Makefiles and CMake</h4>
    <p>A <strong>Makefile</strong> describes how source files become a final binary — which compiler, which flags, which files depend on which — letting a full rebuild happen with one command rather than hand-typed compiler invocations. <strong>CMake</strong> sits a level above Makefiles: rather than writing build rules directly, you describe the project's structure and CMake generates the actual build files for whatever toolchain you're targeting, which is the practical reason most multi-platform or multi-target embedded projects (the same codebase built for several different board variants) use CMake rather than hand-written Makefiles.</p>
    <h4>Git workflow for firmware teams</h4>
    <p>Firmware repos have a wrinkle application repos usually don't: the code's correctness is tied to a specific, physical hardware revision. Common patterns that address this: <strong>branches per board revision</strong> when hardware changes enough to need genuinely different firmware (a new sensor, a repinned connector) but the old revision is still in the field and needs bugfixes; <strong>tagged releases</strong> matched precisely to what was actually flashed onto shipped or deployed units, so "what exact code is running on the unit that just failed in the field" is always answerable; and commit messages or changelogs that explicitly reference hardware revision compatibility, since a binary built for one board revision can behave unpredictably — or simply not work — flashed onto a different one with a different pin mapping or peripheral configuration.</p>
    <h4>Continuous Integration for embedded</h4>
    <p>CI for firmware typically runs the unit tests from Lesson 8.2 on every commit (fast, no hardware required), and increasingly also triggers HIL test runs against real hardware rigs for a fuller — if slower and more expensive — layer of automated verification before a build is trusted enough to flash onto real units.</p>
    <div class="exblock"><div class="ex-label">Try it yourself</div>
      <p>A customer reports a bug on a unit shipped 8 months ago. Your repo has moved on through dozens of commits since then, across two hardware revisions. What two version-control habits, set up from day one, would let you answer "what exact firmware is running on that unit, and how do I rebuild that exact binary today" with confidence?</p>
      <details class="qcard exercise"><summary><span class="qnum">Solution</span></summary>
        <div class="answer"><strong>Tagged releases</strong> — every build that's actually flashed onto a shipped or deployed unit gets an immutable tag (e.g. <code>v2.3.1-rev-b</code>) at the exact commit it was built from, so "what's running on that unit" maps directly back to one unambiguous point in history. <strong>Recording the hardware revision the firmware targets</strong> — either as a build-time flag baked into the binary (readable from the device itself, e.g. over a debug command) or as part of the tag/branch naming — so you don't accidentally rebuild and reflash a unit with firmware built for the wrong board revision's pinout.</div>
      </details>
    </div>
  `},
  { id:'9-2', title:'Embedded Security Basics', body:`
    <p>It's tempting to assume a small, "boring" embedded device isn't a meaningful security target — but exactly that assumption is why embedded security failures (compromised IoT cameras, hijacked vehicle ECUs, counterfeit firmware on safety-relevant devices) keep making headlines. Reachability and lack of monitoring, not raw value, drive most real-world attacks.</p>
    <h4>Secure boot</h4>
    <p><strong>Secure boot</strong> extends the bootloader concept from Lesson 7.2 with cryptographic verification: before running an application image, the bootloader checks a digital signature against a trusted key burned into the chip at manufacture, and refuses to run (or roll back to a known-good image) if the signature doesn't match. This is what stops an attacker from simply flashing arbitrary malicious firmware onto a device they have physical or remote write access to.</p>
    <h4>Firmware encryption and signing</h4>
    <p>Signing (verifying authenticity — "this came from us, unmodified") and encryption (protecting confidentiality — "an attacker who intercepts this image can't read your proprietary code") are distinct and often both used together: an OTA update package is typically encrypted in transit and signed so the receiving device can verify both that it's genuine and that it hasn't been tampered with before ever writing it into the inactive flash bank from Lesson 7.2.</p>
    <h4>Common attack surfaces</h4>
    <ul>
      <li><strong>Debug ports left enabled in production</strong> — an exposed SWD/JTAG header (Lesson 2.4) on a shipped product can let an attacker with brief physical access dump the entire flash contents, including any unprotected keys or proprietary code, or halt and reprogram the chip outright.</li>
      <li><strong>Unauthenticated communication links</strong> — a UART debug console or an unauthenticated wireless command interface left active in the field is a direct route to issuing privileged commands the device's normal operation never intended to expose.</li>
      <li><strong>Unsigned firmware updates</strong> — without secure boot, any OTA or DFU mechanism (Lesson 7.2) becomes a route to install attacker-controlled firmware with full system privileges.</li>
    </ul>
    <p>Most MCU vendors now ship dedicated silicon features for this — read-out protection that disables debug access once enabled, hardware crypto accelerators, secure key storage — specifically because retrofitting security after a product design is finalized is far harder than designing it in from the start.</p>
  `},
] },

{ id:'umem', title:'Unit 10 — Memory Hierarchy & OS Internals', lessons:[
  { id:'m-1', title:'The Memory Hierarchy: Why Faster Memory Is Always Smaller', body:`
    <p>Every computer — from a bare-metal MCU to a server — is built around the same tradeoff: the closer memory sits to the CPU, the faster and more expensive it is, so systems use a <strong>layered hierarchy</strong> rather than one uniform pool, with the smallest, fastest layers closest to the core.</p>
    <table><tr><td>Layer</td><td>Typical size</td><td>Access latency</td><td>Holds</td></tr>
      <tr><td>CPU registers</td><td>a few KB</td><td>1 cycle</td><td>Values actively being computed on right now, the next-instruction address, the stack pointer</td></tr>
      <tr><td>L1 cache</td><td>32–128 KB</td><td>1–4 cycles</td><td>Recently used instructions (L1-I) and data (L1-D)</td></tr>
      <tr><td>L2 cache</td><td>256 KB–4 MB</td><td>10–20 cycles</td><td>Data likely needed soon but accessed less often than L1's contents</td></tr>
      <tr><td>L3 cache</td><td>2–64 MB, shared across cores</td><td>40–60 cycles</td><td>Large working sets shared between cores</td></tr>
      <tr><td>RAM (DRAM)</td><td>4–64 GB</td><td>200–400 cycles</td><td>The running program, stack, heap, global data — the full working set</td></tr>
      <tr><td>SSD / HDD</td><td>100s of GB+</td><td>100,000+ (SSD) / 10,000,000+ (HDD) cycles</td><td>OS, applications, everything not currently running</td></tr></table>
    <p>This is a general-purpose-computing picture (an MCU usually has no L2/L3 and no disk at all — just registers, sometimes a small cache, flash, and RAM), but the underlying principle is the same one driving Lesson 2.5's clock-tree discussion and Lesson 2.6's case for DMA: <strong>the gap between CPU speed and memory speed is the single biggest performance bottleneck in nearly every system</strong>, and almost every architectural feature in this lesson and the next three exists specifically to hide that gap.</p>
    <h4>How data moves through the hierarchy</h4>
    <p>When the CPU needs a value, it checks the closest cache first. A <strong>cache hit</strong> returns the value immediately from that fast layer; a <strong>cache miss</strong> means checking the next layer out, all the way down to RAM if necessary — and the dedicated <strong>memory controller</strong> hardware (not software, not the OS) is what actually moves data from RAM into cache, completely automatically. As new data is loaded, the least-recently-used data already in cache gets evicted back down a level to make room — this happens transparently in hardware, which is why even a bare-metal MCU with no operating system at all still benefits from caching if it has one.</p>
    <div class="callout"><div class="callout-label">Why this matters for firmware</div>Code and data layout that respects this hierarchy — keeping a hot loop's working set small enough to fit in cache, accessing arrays sequentially rather than scattered randomly — can be the difference between a control loop that meets its deadline and one that doesn't, even with identical instruction counts. "How many cycles does this actually cost once memory access is accounted for" is a different, often more important question than "how many instructions does this take."</div>
  `},
  { id:'m-2', title:'RAM Types & Non-Volatile Memory, Compared', body:`
    <p>"RAM" and "flash" aren't single technologies — different physical implementations trade off speed, cost, density, and power very differently, and picking the right one (or knowing which one a given chip already gives you) matters.</p>
    <h4>DRAM vs. SRAM</h4>
    <p><strong>DRAM</strong> (Dynamic RAM) stores each bit as a charge on a tiny capacitor — cheap and dense, which is why it's used for a system's main memory, but that charge leaks over time, so the memory controller must continuously <strong>refresh</strong> every row periodically or the data is lost; this refresh overhead is part of why DRAM is slower and higher-power than the alternative. <strong>SRAM</strong> (Static RAM) stores each bit in a small flip-flop circuit instead — faster, lower power, no refresh needed, but far more transistors per bit, making it more expensive and lower-density. This is exactly why SRAM is used for CPU cache (Lesson m-1) where speed matters most and capacity needs are small, while DRAM is used for main RAM where capacity matters most.</p>
    <h4>ROM family</h4>
    <p>All variants are <strong>read-only in normal operation</strong>, differing in how (or whether) they can be reprogrammed: <strong>Mask ROM</strong> is permanently set at the factory and can never change; <strong>PROM</strong> can be written exactly once with special equipment; <strong>EPROM</strong> can be erased (with UV light, physically) and reprogrammed; <strong>EEPROM</strong> can be erased and reprogrammed electrically, byte by byte, but is slow per write compared to flash.</p>
    <h4>Flash: a type of EEPROM, split into two families</h4>
    <p><strong>NOR flash</strong> supports <strong>execute-in-place (XIP)</strong> — the CPU can run code directly out of it without first copying to RAM, which is exactly why MCU program flash (Unit 2's discussion of where your compiled firmware lives) is NOR flash. <strong>NAND flash</strong> trades that direct-execute capability for much higher density and lower cost per byte, which is why it's used in SSDs, USB drives, and SD cards — bulk storage that gets read into RAM before being executed or processed, never run from directly.</p>
    <div class="callout violet"><div class="callout-label">Connecting back to Unit 8</div>The erase-before-write behavior, limited write endurance, and wear-leveling requirement covered in Lesson 8.1 for "flash" generally are specifically NOR-flash behaviors at the physical level — now you have the underlying reason: both NOR and NAND share the same floating-gate cell technology and its same write-endurance physics, just optimized for different access patterns.</div>
  `},
  { id:'m-3', title:'Cache Mapping & Multi-Core Cache Coherence', body:`
    <p>When the CPU wants to cache a piece of data from a specific RAM address, it needs a rule for <em>where in cache that data is allowed to go</em> — and that rule is a real engineering tradeoff between speed, hit rate, and hardware cost.</p>
    <h4>Three mapping strategies</h4>
    <ul>
      <li><strong>Direct mapping</strong> — each memory block maps to exactly one specific cache line, determined by its address. Fast and simple in hardware, but if two frequently-used blocks happen to map to the same line, they constantly evict each other — a <strong>conflict miss</strong> — even while the rest of the cache sits unused.</li>
      <li><strong>Fully associative</strong> — any memory block can go in any cache line at all, checked via specialized content-addressable hardware. This eliminates conflict misses entirely, but the hardware to search every line simultaneously is expensive and doesn't scale to large caches.</li>
      <li><strong>Set associative</strong> — the practical middle ground used by virtually every real CPU: cache lines are grouped into sets, and a memory block can go into any line within its one assigned set (commonly "4-way" or "8-way," meaning 4 or 8 candidate lines per set). This captures most of fully-associative's hit-rate benefit at close to direct-mapping's hardware cost.</li>
    </ul>
    <h4>Cache miss types</h4>
    <p>A <strong>compulsory miss</strong> happens the first time any block is ever accessed (cache starts empty, nothing to be done about it). A <strong>capacity miss</strong> happens when the cache is simply too small to hold the whole working set, regardless of mapping strategy. A <strong>conflict miss</strong> is specific to direct-mapped and set-associative caches — there was room elsewhere in the cache, but the mapping rule forced an eviction anyway.</p>
    <h4>Multi-core cache coherence: MOESI</h4>
    <p>Once multiple CPU cores each have their own cache, a new problem appears: what if two cores cache the same RAM address, and one of them modifies it? Without coordination, the other core would keep reading stale data forever. <strong>MOESI</strong> is a common coherence protocol where every cached block is tagged with one of five states, tracked and updated automatically by the cache controller hardware in each core:</p>
    <table><tr><td>State</td><td>Meaning</td></tr>
      <tr><td style="color:var(--cyan);">Modified</td><td>Only this cache has the current value; RAM is stale and must be written back before any other core may read it</td></tr>
      <tr><td style="color:var(--cyan);">Owned</td><td>This cache has the latest value and other caches may also have a (read-only) copy; RAM is stale</td></tr>
      <tr><td style="color:var(--cyan);">Exclusive</td><td>Only this cache has the value, and it matches RAM exactly</td></tr>
      <tr><td style="color:var(--cyan);">Shared</td><td>Multiple caches hold a clean copy, matching RAM; no modification allowed without first invalidating the others</td></tr>
      <tr><td style="color:var(--cyan);">Invalid</td><td>This cache's copy is stale and must be re-fetched before use</td></tr></table>
    <p>This is entirely a hardware-managed protocol — software never directly manipulates these states — but it's worth knowing as the mechanism that makes Unit 6's shared-memory concurrency hazards even possible to reason about correctly across multiple physical cores, not just multiple threads time-sliced on one core.</p>
    <h4>Bus contention</h4>
    <p>When multiple components — cores, DMA controllers, peripherals — all need the shared memory bus at once, only one transfer can actually happen at a time, and everyone else stalls. This is mitigated by caching (fewer trips to the bus needed at all), by separating high-speed and low-speed buses so slow peripherals don't block fast memory traffic, and by widening memory bandwidth where the budget allows it.</p>
  `},
  { id:'m-4', title:'Virtual Memory, Page Tables & the TLB', body:`
    <p>On a system running an OS (not a bare-metal MCU — see Lesson m-5), a process never touches physical RAM addresses directly. Instead, the OS gives every process its own <strong>virtual address space</strong>, and dedicated hardware translates virtual addresses to real physical ones on every single memory access.</p>
    <h4>What virtual memory actually solves</h4>
    <ul>
