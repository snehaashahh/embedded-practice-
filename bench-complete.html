      <li><strong>Memory security</strong> — without it, two processes could end up mapped to the same physical address and silently read or corrupt each other's data; virtual memory gives every process the illusion of owning the entire address space alone.</li>
      <li><strong>Memory fragmentation</strong> — physical RAM can become a patchwork of small free gaps over time even when the total free space is plenty; virtual memory lets a process see a clean, contiguous range that the OS maps onto scattered physical pages underneath, invisibly.</li>
      <li><strong>Running programs larger than physical RAM</strong> — inactive pages can be moved out to disk (<strong>swap space</strong>) and brought back only when actually accessed.</li>
    </ul>
    <h4>Pages and page tables</h4>
    <p>RAM is divided into fixed-size <strong>pages</strong> (commonly 4 KB). Each process has a <strong>page table</strong> mapping its <strong>virtual page numbers (VPN)</strong> to <strong>physical page numbers (PPN)</strong> in real RAM. A virtual address splits into a VPN (which page) and a page offset (which byte within that page) — the OS only needs to track page-granularity mappings, not one entry per byte, which keeps the table a manageable size.</p>
    <pre>virtual address  = [ VPN | offset ]
physical address = [ PPN | offset ]   <span class="cm">// offset is unchanged — only the page number is translated</span></pre>
    <p>The <strong>MMU</strong> (Memory Management Unit, one per CPU core) is the hardware that performs this VPN→PPN translation on every memory access by consulting the page table, then hands the resulting physical address to the cache and memory controller exactly as in Lesson m-1.</p>
    <h4>Page faults and demand paging</h4>
    <p>If a process accesses a virtual address whose page isn't currently in RAM (it's been swapped to disk, or never loaded yet), the CPU raises a <strong>page fault</strong>: the OS pauses that process, loads the missing page from disk, updates the page table, and resumes — invisible to the program, but slow, since disk access costs orders of magnitude more cycles than RAM (Lesson m-1's table). <strong>Demand paging</strong> deliberately only loads pages as they're actually touched rather than the whole program up front, trading some page-fault overhead for dramatically lower memory usage and faster startup.</p>
    <h4>The TLB: caching the page table itself</h4>
    <p>A full page-table lookup is itself a slow RAM access, and doing one on every single memory reference would defeat much of the point of having fast caches at all. The <strong>Translation Lookaside Buffer (TLB)</strong> is a small, very fast cache inside the CPU core that stores recently-used VPN→PPN translations. A <strong>TLB hit</strong> skips the page-table walk entirely; a <strong>TLB miss</strong> falls back to the full page-table lookup in RAM and then populates the TLB with the result for next time. The OS tags entries by <strong>Process ID (PID)</strong> so two processes' virtual addresses — which can legitimately be identical numbers pointing at completely different physical memory — never get confused with each other.</p>
    <div class="callout warn"><div class="callout-label">Why real-time embedded systems usually skip all of this</div>Page faults are fundamentally unpredictable in timing — exactly the property a hard-real-time system can't tolerate (Lesson 6.1). Most embedded RTOS designs run a single process with one flat physical address space, no virtual memory, no MMU translation, and no swap — trading away the protection and flexibility benefits above in direct exchange for deterministic, guaranteed-bounded memory access timing.</div>
  `},
  { id:'m-5', title:'Kernel vs. User Space, and How an OS Schedules Work', body:`
    <p>Everything in this lesson assumes a system running a full OS (embedded Linux, a desktop) rather than RTOS/bare-metal firmware — useful context for embedded Linux roles, and for understanding exactly what an RTOS or bare-metal target deliberately does <em>not</em> have.</p>
    <h4>The kernel's job</h4>
    <p>The <strong>kernel</strong> is the core OS component sitting between applications and hardware, responsible for process management (creating, scheduling, terminating processes, and inter-process communication), memory management (virtual memory from Lesson m-4, allocation, protection), the file system, and device management. Application code never touches hardware directly — it asks the kernel to do so on its behalf.</p>
    <h4>Kernel space vs. user space</h4>
    <p>Hardware enforces a hard privilege boundary: <strong>kernel space</strong> has full, unrestricted hardware access and runs the OS itself; <strong>user space</strong> is where ordinary applications run, with no direct hardware access at all. When a user-space program needs something privileged — opening a file, reading from a network socket, allocating memory — it issues a <strong>system call</strong> (<code>open()</code>, <code>read()</code>, <code>write()</code>), which triggers a controlled transition into kernel mode, lets the kernel perform the privileged operation safely on the program's behalf, and returns control back to user space. This boundary is exactly what makes a buggy or malicious user-space application unable to directly crash the whole system or read another process's memory.</p>
    <h4>Process vs. thread, precisely</h4>
    <table><tr><td>&nbsp;</td><td>Process</td><td>Thread</td></tr>
      <tr><td>Memory space</td><td>Own, fully isolated (stack, heap, data, code)</td><td>Shares its process's heap and static memory; own stack and TCB only</td></tr>
      <tr><td>Communication</td><td>Requires IPC — pipes, sockets, shared memory</td><td>Direct, since memory is already shared</td></tr>
      <tr><td>Fault isolation</td><td>One process crashing doesn't take down others</td><td>One thread corrupting shared memory can crash the whole process</td></tr>
      <tr><td>Overhead</td><td>Higher — separate address space, requires MMU/page table setup</td><td>Lower — much less to set up per thread</td></tr>
      <tr><td>Parallelism</td><td>Can run on separate cores independently</td><td>Can also run on separate cores, but shares one process's resources</td></tr></table>
    <p>This is the same tradeoff Unit 6 frames at the RTOS-task level: shared memory makes threads cheap and communication trivial, but turns every shared access into a potential race condition requiring the mutexes and semaphores from Lesson 6.3 — exactly the same primitives, now motivated from the OS side instead of the RTOS side.</p>
    <h4>Schedulers: Linux vs. RTOS, side by side</h4>
    <p>Linux's default scheduler, <strong>CFS</strong> (Completely Fair Scheduler), tracks each process's accumulated <strong>virtual runtime</strong> and always runs whichever process has used the least CPU time so far — fair, throughput-oriented, but with no real-time guarantees about when any specific task runs. An RTOS instead uses scheduling policies chosen specifically for predictability: <strong>rate-monotonic</strong> (shorter-period tasks get higher fixed priority — Lesson 6.2), <strong>earliest-deadline-first</strong> (whichever task's deadline is soonest runs next), or simple <strong>round-robin</strong> among equal-priority tasks. The difference in philosophy is the whole point: CFS optimizes for average fairness across many unrelated programs, while an RTOS scheduler optimizes for bounded, provable worst-case latency on a known, fixed set of tasks — fairness is explicitly not the goal.</p>
    <h4>The slab allocator: avoiding heap fragmentation at the kernel level</h4>
    <p>Even within one process's virtual address space, repeated <code>malloc</code>/<code>free</code> cycles can fragment the heap (Lesson 1.4). The kernel's own internal allocator typically avoids this with a <strong>slab allocator</strong>: pre-allocate fixed-size memory pools (a <em>cache</em>) per object type, carve each cache into <em>slabs</em> (contiguous chunks), and serve individual fixed-size <em>objects</em> out of those slabs. Because every object of a given type is the same size, there's no general-purpose hunting for "a free block big enough" the way a generic heap allocator must do — allocation is fast, and fragmentation is largely confined to within a slab rather than across the whole heap. This is conceptually the OS-level cousin of the fixed-size memory-pool advice Lesson 1.4 already gave for real-time embedded code: in both cases, the fix for fragmentation is refusing to let allocation sizes be arbitrary in the first place.</p>
  `},
] },

{ id:'uproj', title:'Unit 11 — Hands-On Projects', lessons:[
  { id:'p0', title:'Project 0 — Toolchain Bring-Up & Your First Register-Level Blink', body:`
    <div class="proj-meta"><span class="proj-tag diff-1">difficulty: starter</span><span class="proj-tag">~3–5 hrs</span><span class="proj-tag">uses: Units 1–2</span></div>
    <p><strong>Goal:</strong> get a working toolchain, flash something onto real silicon (or a simulator), and blink an LED using direct register writes — no HAL, no vendor convenience functions. The point isn't the LED; it's proving every link in the chain from source code to running hardware actually works, and feeling the register-level pattern from Unit 2 in your hands once before anything wraps it in abstraction.</p>
    <h4>Hardware (pick one)</h4>
    <ul>
      <li><strong>Real board (recommended):</strong> an STM32 "Blue Pill" (STM32F103) or an ST Nucleo board — both inexpensive, both well documented, both used throughout the Arm edX course from Unit 0.</li>
      <li><strong>No hardware yet:</strong> use <a href="https://wokwi.com" target="_blank">Wokwi</a> (free in-browser simulator supporting several MCUs including STM32 and Arduino) or the Mbed simulator referenced in the edX course.</li>
    </ul>
    <h4>Build checklist</h4>
    <ul class="checklist">
      <li>Install a cross-compiler toolchain (<code>arm-none-eabi-gcc</code> for ARM Cortex-M parts) and a flashing tool (ST-Link utility, OpenOCD, or your simulator's built-in flash step).</li>
      <li>Find your chip's reference manual or datasheet and locate the GPIO peripheral's base address and the offset for the mode register and output data register (Lesson 2.2).</li>
      <li>Write a minimal <code>main.c</code> that: enables the GPIO port's clock (Lesson 2.5 — peripherals are dead until clocked), configures one pin as a push-pull output (Lesson 2.3), then loops forever toggling it with a crude busy-wait delay.</li>
      <li>Write (or borrow a minimal) linker script and startup file so the vector table and reset handler exist (Lesson 2.4) — most toolchains/IDEs provide a starter one; understand what it's doing rather than only copy-pasting it.</li>
      <li>Build, flash, and confirm the LED actually blinks at a rate you can perceive.</li>
      <li>Open the compiled <code>.map</code> file and find where your blink loop's variables landed — confirm you can identify <code>.text</code>, <code>.data</code>, and <code>.bss</code> as discussed in Lesson 2.4.</li>
    </ul>
    <pre><span class="cm">// conceptual skeleton — register names/offsets vary by exact chip, check your reference manual</span>
<span class="cm">#define</span> RCC_AHB1ENR  (*(<span class="kw">volatile</span> <span class="ty">uint32_t</span>*)0x40023830)
<span class="cm">#define</span> GPIOA_MODER  (*(<span class="kw">volatile</span> <span class="ty">uint32_t</span>*)0x40020000)
<span class="cm">#define</span> GPIOA_ODR    (*(<span class="kw">volatile</span> <span class="ty">uint32_t</span>*)0x40020014)

<span class="ty">int</span> main(<span class="ty">void</span>) {
  RCC_AHB1ENR |= (1 &lt;&lt; 0);        <span class="cm">// enable GPIOA clock — do this FIRST</span>
  GPIOA_MODER |= (1 &lt;&lt; 10);       <span class="cm">// pin 5 -&gt; output mode</span>
  <span class="kw">while</span> (1) {
    GPIOA_ODR ^= (1 &lt;&lt; 5);         <span class="cm">// toggle pin 5</span>
    <span class="kw">for</span> (<span class="kw">volatile</span> <span class="ty">int</span> i = 0; i &lt; 500000; i++) { } <span class="cm">// crude delay — you'll replace this with a real timer in Project 1</span>
  }
}</pre>
    <h4>Checkpoint</h4>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>Your LED blinks, but at a rate that's clearly wrong — way faster or slower than your busy-wait loop count should produce. List three different real causes that could explain this (hint: think about what Lesson 2.5 said the very first thing every project configures is).</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal possibilities</span></summary>
        <div class="answer">1) The system clock is running at its default/internal-oscillator speed, not the speed you assumed — if you never explicitly configured the clock tree, your chip may be running far slower than its rated maximum. 2) The compiler optimized your empty busy-wait loop away or shortened it, because the loop variable wasn't <code>volatile</code> (Lesson 1.4) — declaring it volatile, as in the skeleton above, is what stops this. 3) You're toggling the wrong bit/pin, and what you're actually seeing is a different pin's default state or a floating input flickering, not your output at all — worth confirming with a second, deliberately-slow toggle you can count by eye.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Replace the busy-wait with a real hardware timer interrupt that toggles the pin (you'll build the full version of this pattern in Project 1) — and time how long 500,000 loop iterations actually took using the timer, to find out your true clock speed empirically rather than guessing.</p>
  `},
  { id:'p1', title:'Project 1 — Interrupt-Driven, Debounced Button → Event Loop', body:`
    <div class="proj-meta"><span class="proj-tag diff-1">difficulty: starter</span><span class="proj-tag">~4–6 hrs</span><span class="proj-tag">uses: Units 2–3</span></div>
    <p><strong>Goal:</strong> replace polling with a real interrupt, and build the debounce FSM from Lesson 3.5 for real — the single most common "first real firmware feature" in the industry, and a near-guaranteed interview talking point if you can describe how you handled the bounce.</p>
    <h4>What you're building</h4>
    <p>A button wired to a GPIO input triggers an interrupt on each edge. The ISR does the absolute minimum (Lesson 3.4): records the event and sets a flag. The main loop runs a small debounce state machine (<code>IDLE → DEBOUNCE → CONFIRMED</code>) using a timer, and only then toggles the LED from Project 0 — proving a real "press" rather than a contact bounce caused the action.</p>
    <ul class="checklist">
      <li>Configure the button pin as an input with an internal pull-up or pull-down (Lesson 2.3), matching how your button is wired.</li>
      <li>Enable a GPIO external interrupt (often called EXTI) on the falling or rising edge, and write the interrupt handler — minimal: set a <code>volatile</code> flag, nothing else (Lesson 3.4).</li>
      <li>In <code>main()</code>, poll that flag. On seeing it set, clear it and start a debounce timer instead of acting immediately.</li>
      <li>Implement the three-state debounce FSM from Lesson 3.5 explicitly with a <code>switch</code> (Lesson 3.1) — don't just add an ad-hoc delay; build the actual state machine so you can describe it in an interview.</li>
      <li>Confirm in hardware: rapidly, intentionally jiggle the button and verify your LED toggles exactly once per intentional press, not once per bounce.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>Your debounce window is set to 5 ms and mostly works, but occasionally still double-toggles on a particularly worn button. What's the first thing to try changing, and what's the tradeoff of setting that value too high?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">Increase the debounce window (try 20–50 ms — many real mechanical switches bounce longer than 5 ms, especially as contacts wear). The tradeoff: too long a window makes the system feel laggy and can cause it to miss a deliberate second press that comes quickly after the first — there's a real ceiling above which you start trading away responsiveness for noise immunity, and the right value is empirical, not theoretical.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Add a second event type — long-press detection (held > 1 second) — as a fourth FSM state, reusing the same timer.</p>
  `},
  { id:'p2', title:'Project 2 — A UART Command Shell for Your Board', body:`
    <div class="proj-meta"><span class="proj-tag diff-2">difficulty: intermediate</span><span class="proj-tag">~5–8 hrs</span><span class="proj-tag">uses: Units 4, 7</span></div>
    <p><strong>Goal:</strong> give your board a real text interface over UART (Lesson 4.1) — type a command on your laptop, the MCU parses and executes it. This is the single most useful debugging tool you'll build in this whole course, and you'll likely keep some version of it in every future project.</p>
    <ul class="checklist">
      <li>Configure UART at a fixed baud rate (115200 8N1 is a sane default) and confirm you can both transmit a fixed string and echo back whatever you type, using a serial terminal on your laptop.</li>
      <li>Buffer incoming bytes in a small fixed-size array (no <code>malloc</code> — Lesson 1.4) until you see a newline, then treat that buffer as one command line.</li>
      <li>Write a simple command parser: split on spaces, match the first token against a small table of known commands (start with <code>led on</code>, <code>led off</code>, <code>status</code>).</li>
      <li>Implement <code>status</code> to report something real — uptime in seconds (using a timer you've configured), or the current debounced button state from Project 1.</li>
      <li>Move byte reception into the UART's receive interrupt rather than polling (apply Lesson 3.4's ISR-safe pattern directly), so the shell doesn't block your main loop or Project 1's debounce logic.</li>
    </ul>
    <pre><span class="cm">// minimal command table pattern</span>
<span class="kw">typedef struct</span> { <span class="kw">const</span> <span class="ty">char</span> *name; <span class="ty">void</span> (*handler)(<span class="ty">const</span> <span class="ty">char</span>*); } Command;
Command commands[] = {
  {"led", cmd_led},
  {"status", cmd_status},
};</pre>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>You type commands fast and occasionally a command line comes out garbled — characters missing or duplicated. Your receive buffer is a fixed 32-byte array, written to from the UART RX interrupt and read from the main loop once a newline arrives. What's the most likely root cause, and which lesson's pattern fixes it?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">Most likely a race: the ISR is still writing new bytes into the buffer (or has wrapped/overwritten it) while the main loop is in the middle of reading the "completed" line out — there's no synchronization between the two contexts. The fix is the same flag-and-copy pattern from Lesson 3.4: when the ISR sees a newline, it should atomically mark the buffer "ready" and switch to writing into a second buffer, so the main loop is always reading a buffer the ISR has stopped touching (a simple double-buffer), or use a short critical section around the handoff.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Add a <code>help</code> command that lists every registered command automatically by walking the command table — and a basic argument parser so <code>led on</code> and <code>led off</code> share one handler instead of two.</p>
  `},
  { id:'p3', title:'Project 3 — ADC-Driven PWM: A Potentiometer Controls Brightness', body:`
    <div class="proj-meta"><span class="proj-tag diff-2">difficulty: intermediate</span><span class="proj-tag">~4–6 hrs</span><span class="proj-tag">uses: Unit 5</span></div>
    <p><strong>Goal:</strong> close a real analog loop — read a potentiometer with the ADC, and drive an LED's (or small motor's) brightness/speed with PWM, with the duty cycle controlled live by the pot. This is the sense → decide → actuate loop from Lesson 1.1 made concrete with real analog hardware.</p>
    <ul class="checklist">
      <li>Wire a potentiometer across your supply rail and ground, with the wiper into an ADC-capable pin.</li>
      <li>Configure the ADC (Lesson 5.2) for single-channel conversion and read a raw value — first by simple polling, to confirm it works and responds as you turn the pot.</li>
      <li>Configure a timer for PWM output (Lesson 5.3) on an LED (or a motor through an appropriate driver — never drive a motor directly off a GPIO pin).</li>
      <li>Map the ADC's raw range (commonly 0–4095 for a 12-bit ADC) onto your PWM compare register's range, and update the compare value continuously in your main loop.</li>
      <li>Move ADC sampling onto DMA (Lesson 2.6) instead of polling, so a buffer fills continuously in the background — confirm the brightness still tracks the pot smoothly with the CPU now free.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>The LED brightness visibly flickers or jitters even when you're not touching the pot. Name two distinct real causes (one electrical, one about how you're sampling) and a fix for each.</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer"><strong>Electrical:</strong> ADC readings are noisy — a wiper not making perfectly clean contact, or supply-rail noise riding on the reference voltage — causing small raw-value jitter that maps onto a visibly flickering duty cycle. Fix: average several consecutive samples (a simple moving average or a low-pass filter, Lesson 5.4) before mapping to PWM, smoothing out single-sample noise. <strong>Sampling:</strong> if you're triggering a fresh ADC conversion mid-PWM-cycle without synchronizing the two, you can read a value at an inconsistent point, compounding the noise. Fix: trigger ADC sampling on a predictable schedule (e.g., a timer-triggered conversion) rather than ad hoc in the main loop.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Add a second potentiometer and a second PWM channel — fade between two colors on an RGB LED, controlled by two independent analog inputs.</p>
  `},
  { id:'p4', title:'Project 4 — Write a Real I²C Sensor Driver From a Datasheet', body:`
    <div class="proj-meta"><span class="proj-tag diff-2">difficulty: intermediate</span><span class="proj-tag">~6–10 hrs</span><span class="proj-tag">uses: Unit 4</span></div>
    <p><strong>Goal:</strong> this is the project that proves you can read a real datasheet and turn it into working code — arguably the most representative "day in the life" embedded task of all, and a strong portfolio piece because it shows independent capability rather than following a tutorial.</p>
    <p>Pick a cheap, well-documented I²C sensor — an MPU6050 (accelerometer/gyro), a BMP280 (pressure/temperature), or similar — all under $5–10 and widely available.</p>
    <ul class="checklist">
      <li>Download the sensor's datasheet. Find its fixed 7-bit address, and the register map for whatever value you want to read (e.g. temperature).</li>
      <li>Implement basic I²C register read/write helper functions (Lesson 4.3): a "write register" function (send address, register number, value) and a "read register" function (send address + register number, then a repeated start and a read).</li>
      <li>Read the sensor's WHO_AM_I or chip-ID register first, before anything else, and confirm it matches the datasheet's expected value — this is the standard first sanity check in real driver bring-up, and catches wiring mistakes before you waste time debugging "wrong" data that's actually just garbage from a misaddressed device.</li>
      <li>Implement whatever initialization sequence the datasheet specifies (often: take the sensor out of sleep mode, set a sample rate or range register).</li>
      <li>Read the actual sensor data register(s), apply whatever scaling factor the datasheet specifies, and print a real, correctly-scaled value (°C, g-force, hPa) over your Project 2 UART shell as a new <code>read</code> command.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>Your WHO_AM_I read returns 0x00 every time, or the bus seems to hang. Walk through the three most likely causes in the order you'd actually check them.</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">1) Wiring/pull-ups first — I²C needs external (or enabled internal) pull-up resistors on both SDA and SCL (Lesson 4.3); without them the lines never actually reach a valid HIGH and every transaction fails silently. 2) Wrong address — double check whether the datasheet's address is already shifted for the read/write bit or not; this is a very common off-by-one-bit mistake. 3) Missing ACK handling or a malformed start/stop sequence in your low-level driver code — a single misplaced repeated-start can desynchronize the whole transaction. Check these roughly in that order, since wiring is fastest to rule out and a logic analyzer or oscilloscope on SDA/SCL (if available) will immediately show whether bytes are even appearing on the bus at all.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Stream sensor data continuously over UART and plot it live on your laptop (even a simple serial plotter tool works) — seeing real, noisy sensor data is what makes Lesson 5.4's filtering material click.</p>
  `},
  { id:'p5', title:'Project 5 — Port a Bare-Metal Project Onto FreeRTOS', body:`
    <div class="proj-meta"><span class="proj-tag diff-3">difficulty: advanced</span><span class="proj-tag">~6–10 hrs</span><span class="proj-tag">uses: Unit 6</span></div>
    <p><strong>Goal:</strong> take the bare-metal "everything in one main loop" style you've used through Projects 0–4 and restructure it as proper FreeRTOS tasks communicating through a queue — the single biggest mental shift in this whole course, and one of the most commonly probed practical RTOS skills in interviews.</p>
    <ul class="checklist">
      <li>Get FreeRTOS building and running on your board (most vendor toolchains have a built-in example project — start from one rather than wiring it up from scratch).</li>
      <li>Create two tasks: a <strong>sensor task</strong> that reads your Project 4 sensor on a fixed period (e.g. every 100 ms) and a <strong>report task</strong> that prints readings over your Project 2 UART shell.</li>
      <li>Connect them with a <strong>queue</strong> (Lesson 6.3), not a shared global variable — the sensor task pushes each reading, the report task blocks waiting for one and prints it.</li>
      <li>Move your Project 1 button handling into its own task too, woken by a <strong>task notification</strong> from the button ISR rather than a polled flag.</li>
      <li>Give the three tasks distinct, deliberately chosen priorities, and justify the ordering out loud — what should win if two become ready at the exact same instant?</li>
      <li>Use FreeRTOS's stack high-water-mark check (Lesson 6.3) on each task and confirm none of them are dangerously close to overflowing their allotted stack.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>After porting, your button presses sometimes feel delayed by up to 100ms even though the button task is notification-driven and should wake near-instantly. What's the most likely priority-related cause?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">The button task likely has equal or lower priority than the sensor task, and the sensor task — even though it only runs briefly every 100 ms — is non-preemptible relative to a same-priority button task under round-robin scheduling, or is simply running at the moment the notification arrives if it has higher priority. The fix is making the button-handling task's priority higher than the periodic sensor task, since a user-facing input event is more time-critical than a routine periodic sample — exactly the kind of priority-assignment reasoning Lesson 6.2 and 6.4 cover, and a very real interview scenario.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Deliberately introduce a priority inversion (have the report task hold a mutex shared with a low-priority logging task, while the sensor task — higher priority — needs it) and observe the stall, then fix it and confirm priority inheritance resolves it. This is genuinely worth doing once to see Lesson 6.4 happen in real timing, not just on paper.</p>
  `},
  { id:'p6', title:'Project 6 — A Minimal UART Bootloader', body:`
    <div class="proj-meta"><span class="proj-tag diff-3">difficulty: advanced</span><span class="proj-tag">~8–12 hrs</span><span class="proj-tag">uses: Units 2, 7</span></div>
    <p><strong>Goal:</strong> build a working, if minimal, version of the bootloader concept from Lesson 7.2 — the project that most directly demonstrates you understand memory layout, linker scripts, and flash programming at a level beyond "I called <code>HAL_FLASH_Program()</code>."</p>
    <ul class="checklist">
      <li>Partition flash into two regions in your linker script: a small bootloader region at the base address, and an application region starting at a fixed offset (e.g. 16 KB in).</li>
      <li>Write a bootloader <code>main()</code> that: on startup, checks a condition (a held button, or a magic value in a fixed RAM location) to decide whether to enter "update mode" or just jump straight to the application.</li>
      <li>Implement the actual <strong>jump to application</strong>: set the main stack pointer from the application's vector table, then jump to the application's reset handler address — both read directly out of the application region's fixed offset (this is the trickiest, most educational part; expect to spend real time here).</li>
      <li>In update mode, implement a simple UART protocol (reuse Project 2's shell pattern) that receives a binary image over UART in fixed-size chunks and writes each chunk into the application flash region — remembering Lesson 7.1's erase-before-write requirement.</li>
      <li>After a successful write, jump to the new application and confirm it actually runs — full end-to-end proof the mechanism works.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>Your bootloader writes the new image successfully, but jumping to the application immediately hard-faults. What's the most likely linker-script or jump-sequence mistake?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">Most likely either: the application's linker script wasn't told its code now starts at the offset address (e.g. 16 KB in) rather than address 0 — so its own internal addresses, and therefore its vector table entries, are wrong relative to where it's actually sitting in flash; or the bootloader's jump sequence forgot to explicitly set the stack pointer from the application's vector table before jumping to its reset handler, leaving the stack pointing at whatever the bootloader was using, which the application's startup code then corrupts immediately. Both are classic first-bootloader mistakes — this project is genuinely one of the harder ones in this course for exactly this reason.</div>
      </details>
    </div>
    <h4>Stretch goal</h4>
    <p>Add a simple checksum or CRC to the transferred image and refuse to jump to the application if it doesn't match — a minimal version of the integrity-checking real bootloaders rely on (Lesson 9.2's secure boot is the fully-hardened version of this same idea).</p>
  `},
  { id:'p7', title:'Project 7 — Retrofit Defensive Firmware Onto an Earlier Project', body:`
    <div class="proj-meta"><span class="proj-tag diff-2">difficulty: intermediate</span><span class="proj-tag">~4–6 hrs</span><span class="proj-tag">uses: Units 2, 8, 9</span></div>
    <p><strong>Goal:</strong> go back to Project 2 or 5 and harden it the way Unit 8 describes — this project is less about new peripherals and more about the habits that separate a demo from something you'd actually ship, and it gives you a concrete "found and fixed a real issue" story for interviews (Lesson 10's portfolio advice, directly applied).</p>
    <ul class="checklist">
      <li>Enable and configure the watchdog timer (Lesson 2.5) and kick it from your main loop — then deliberately introduce an infinite loop bug somewhere and confirm the watchdog actually recovers the system.</li>
      <li>Install a hard fault handler that captures the faulting address to a fixed RAM location before resetting (Lesson 8.1) — then deliberately dereference a null pointer and confirm you can read back what address it tried to access after reset.</li>
      <li>Add <code>assert()</code> checks at two or three points where your code makes an assumption it's currently just trusting silently (a buffer index in range, a sensor value in a plausible range) — and confirm one actually fires when you violate it on purpose.</li>
      <li>Set up a basic CI pipeline (even a simple script run locally counts as a first pass) that builds your project and runs any unit tests you've written for non-hardware logic (Lesson 8.2's HAL-abstraction pattern), so a broken build is caught before it's ever flashed.</li>
      <li>Write a real README for the repo: what hardware it targets, how to build and flash it, what it does, and — important — one paragraph describing a real bug you hit while building it and how you found it.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Checkpoint exercise</div>
      <p>You add the watchdog, but it now resets your board every few seconds even though the main loop looks like it's running fine. What configuration detail did you most likely miss?</p>
      <details class="qcard exercise"><summary><span class="qnum">Reveal answer</span></summary>
        <div class="answer">Most likely the watchdog's timeout period is shorter than your actual loop period (including any blocking operations still left in it, like the UART shell or a sensor read), or you're kicking it from inside a conditional path that doesn't always execute every loop iteration — meaning some valid, slow-but-legitimate loop passes are getting treated as a hang. Check both: increase the timeout to comfortably exceed your loop's real worst-case duration, and make sure the kick happens unconditionally once per loop, not buried inside an <code>if</code>.</div>
      </details>
    </div>
  `},
  { id:'p8', title:'Project 8 — Capstone: A Multi-Peripheral Sense → Decide → Actuate System', body:`
    <div class="proj-meta"><span class="proj-tag diff-3">difficulty: capstone</span><span class="proj-tag">~15–25 hrs</span><span class="proj-tag">uses: everything so far</span></div>
    <p><strong>Goal:</strong> fuse everything from Projects 0–7 into one coherent system — the project that should anchor your resume and your "walk me through a project" interview answer (Lesson 10.4, directly). There's no single right design; pick something that genuinely interests you, but it must hit every item below to count as a real capstone rather than a rehash of one earlier project.</p>
    <h4>Required ingredients (mix and match around any theme you like)</h4>
    <ul class="checklist">
      <li>At least <strong>two different peripherals/protocols</strong> from Unit 4 working together (e.g. an I²C sensor's data reported out over UART, or a CAN message triggering a PWM-driven actuator).</li>
      <li>Built on <strong>FreeRTOS</strong> (Project 5's pattern) with at least three tasks and at least one queue or notification connecting them — not one giant task doing everything.</li>
      <li>At least one <strong>defensive firmware</strong> mechanism from Project 7 actually wired in and demonstrably working, not just present in the code.</li>
      <li>A real <strong>finite state machine</strong> (Lesson 3.1) governing the system's overall mode of operation (e.g. <code>IDLE → ARMED → ACTIVE → FAULT</code>), not just per-feature FSMs like the debounce one.</li>
      <li>A clean, version-controlled repo (Lesson 9.1) with a real README, including a short writeup of one bug you genuinely hit and how you diagnosed it.</li>
    </ul>
    <h4>Example project ideas, if you want a starting theme</h4>
    <ul>
      <li><strong>Environmental logger:</strong> I²C temp/humidity sensor sampled on a task, logged to flash with wear leveling (Lesson 7.1), reportable on demand over your UART shell, with a low-power sleep mode (Lesson 2.5) between samples.</li>
      <li><strong>Simple motor controller:</strong> a PID-ish control loop (even a basic proportional controller counts) reading an encoder or potentiometer, driving a motor via PWM, with a watchdog and a defined FAULT state if the sensor reading goes implausible.</li>
      <li><strong>Multi-sensor alarm system:</strong> two or three different sensors feeding into one FSM that decides ARMED vs. TRIGGERED, reporting state changes over UART or driving an output, with debounced physical arm/disarm buttons from Project 1.</li>
    </ul>
    <div class="exblock"><div class="ex-label">Before you call it done</div>
      <p>Out loud, to yourself or someone else: walk through what happens from power-on to steady-state operation, in order. If there's a step you can't explain precisely — "and then somehow the sensor data gets to the display task" — that's not a finished system yet, that's a system with a gap in it. This is exactly the standard Lesson 10.4 says a real interviewer will hold your project to.</p>
    </div>
  `},
] },

{ id:'u10', title:'Unit 11 — Interview Prep & Career', lessons:[
  { id:'10-1', title:'How Embedded Interviews Actually Work', body:`
    <p>Embedded/firmware interview loops follow a fairly consistent shape across companies, and knowing the shape ahead of time is itself an advantage.</p>
    <ol>
      <li><strong>Recruiter screen.</strong> Background, motivation, logistics — rarely technical depth. Treat "why embedded?" and "why this company?" as real questions worth a prepared, specific answer, not throwaway small talk.</li>
      <li><strong>Technical phone screen.</strong> Usually conceptual rather than live-coding-heavy: explain volatile, explain the difference between a mutex and a semaphore, walk through what happens when an interrupt fires. The goal here is breadth and clear communication, not depth on any one topic — keep answers calibrated to "explain this clearly to someone checking I actually understand it," not an exhaustive dissertation.</li>
      <li><strong>Technical/onsite round(s).</strong> This is where depth gets tested: live coding (often C, sometimes with real register-manipulation or data-structure problems), a debugging scenario ("here's a snippet, what's wrong with it" or "here's a symptom, what would you check first"), and frequently a system design question scaled to embedded — "design the firmware for X sensor system," "how would you architect communication between these three boards."</li>
      <li><strong>Behavioral round.</strong> STAR-format questions about past projects — this is where specific, technically detailed project stories (not generic teamwork anecdotes) differentiate strong candidates, especially stories that include what went wrong and how you diagnosed it, not just what went right.</li>
    </ol>
    <div class="callout"><div class="callout-label">What's actually being evaluated underneath all of it</div>Across every stage, interviewers are really testing for the same thing in different costumes: can you reason precisely about what hardware and software are actually doing at the bit and timing level, rather than working from a fuzzy mental model — and can you communicate that reasoning clearly when something breaks. Every unit in this course was built to make exactly that kind of precise reasoning available to you on demand.</div>
  `},
  { id:'10-2', title:'Core Technical Question Bank', body:`
    <p>Work through these the way you'd actually be asked them — try to answer before expanding each one. They map directly onto Units 1–9.</p>
    <div class="qbank">
      <details class="qcard"><summary><span class="qnum">Q1.</span> What does <code>volatile</code> do, and give a concrete example of when omitting it causes a real bug.</summary>
        <div class="answer"><strong>Answer:</strong> It tells the compiler a variable's value can change outside the program's own visible control flow, so every read must go back to memory rather than reuse a cached/optimized copy. Concrete example: a <code>while ((*status_reg & FLAG) == 0);</code> polling loop on a hardware status bit — without <code>volatile</code>, an optimizing compiler can hoist the read out of the loop entirely (it sees nothing in the loop body that could change the value, from its perspective) and the loop becomes an infinite hang, often only appearing once optimization is enabled. See Lesson 1.4.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q2.</span> Write the line of C that sets bit 5 of a register without disturbing any other bit. Then clear it. Then toggle it.</summary>
        <div class="answer"><strong>Answer:</strong> <code>REG |= (1 &lt;&lt; 5);</code> to set, <code>REG &amp;= ~(1 &lt;&lt; 5);</code> to clear, <code>REG ^= (1 &lt;&lt; 5);</code> to toggle. The interviewer is checking you know <em>why</em> each operator is the right one — OR for setting because anything ORed with 0 is unchanged, AND-with-inverted-mask for clearing because anything ANDed with 1 is unchanged, XOR for toggling because it flips exactly the bits set in the mask. See Lesson 1.3.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q3.</span> What's the difference between a mutex and a binary semaphore?</summary>
        <div class="answer"><strong>Answer:</strong> Both can look identical in basic usage, but they mean different things. A mutex protects a shared resource via mutual exclusion and has ownership — the task that locked it is expected to be the one that unlocks it, which is what lets RTOSes implement priority inheritance on a mutex. A binary semaphore is a signaling mechanism with no ownership concept — commonly given by an ISR and taken by a task to indicate "an event happened," where the giver and the eventual taker are naturally different contexts. Using a semaphore where you actually need resource protection forfeits priority inheritance and can reintroduce priority inversion. See Lesson 6.3.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q4.</span> A device works fine in debug builds but hangs intermittently in release builds. What do you check first?</summary>
        <div class="answer"><strong>Answer:</strong> Missing <code>volatile</code> on a hardware register or a variable shared with an ISR, first — optimizations enabled in release builds are exactly what exposes this class of bug (Lesson 1.4). After that: a timing assumption that held by coincidence in unoptimized code (a busy-wait delay calibrated against debug-build instruction timing, now too short or too long), or a stack-overflow corrupting something that release-build's different stack usage happens to disturb (Lesson 1.5).</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q5.</span> Explain priority inversion and how an RTOS mitigates it.</summary>
        <div class="answer"><strong>Answer:</strong> A low-priority task holds a mutex a high-priority task needs; a medium-priority task, needing neither, keeps preempting the low-priority task, so the low-priority task never finishes and releases the lock — the high-priority task is effectively blocked by a task with lower priority than it. Mitigation: priority inheritance — temporarily boost the low-priority task's priority to match the highest-priority task waiting on its mutex, so medium-priority tasks can no longer preempt it, letting it finish and release the lock promptly. See Lesson 6.4.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q6.</span> Why must UART baud rates match on both ends, but SPI and I²C don't have this issue the same way?</summary>
        <div class="answer"><strong>Answer:</strong> UART has no shared clock line — both sides independently time when to sample each bit, based purely on a pre-agreed bits-per-second rate (the baud rate). A mismatch means the receiver samples at the wrong moments within each bit and reads garbage. SPI and I²C both include a shared clock line generated by one side (the master), so the receiving side samples exactly when told to by that shared clock, removing the need to separately pre-agree on timing. See Lessons 4.1–4.3.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q7.</span> What is aliasing, and how do you prevent it?</summary>
        <div class="answer"><strong>Answer:</strong> Sampling a signal at less than twice its highest frequency component (violating the Nyquist criterion) causes that high-frequency content to be misrepresented as a false, lower frequency in the sampled data — not lost, but actively wrong. Prevention is two-layered: choose a sample rate at least 2x the highest frequency you actually need to capture, and add an analog anti-aliasing low-pass filter ahead of the ADC to attenuate anything above that limit before it's ever sampled, since relying on sample rate alone doesn't protect against unanticipated noise. See Lessons 5.2 and 5.4.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q8.</span> Why should ISRs be kept as short as possible? What pattern do you use instead of doing real work inside one?</summary>
        <div class="answer"><strong>Answer:</strong> A running ISR blocks every interrupt at or below its own priority for its entire duration, which can introduce unacceptable latency or jitter elsewhere in the system, and can also stall the main loop if the ISR runs long enough. Standard pattern: the ISR does the minimum possible — read a value, clear the interrupt source, set a flag or push to a queue — and the actual processing happens in the main loop or a lower-priority task that checks that flag/queue. See Lessons 3.2, 3.4, 6.3.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q9.</span> What's the practical difference between a stack overflow and a heap fragmentation problem, and why are both more dangerous on embedded than on a desktop?</summary>
        <div class="answer"><strong>Answer:</strong> Stack overflow is too many nested calls or one call with too-large local variables pushing the stack pointer past its allotted region, typically corrupting adjacent memory silently rather than throwing a clean error. Heap fragmentation is many alloc/free cycles leaving the heap with enough <em>total</em> free memory but no single <em>contiguous</em> block large enough for a new allocation, so an allocation can fail even though "there's technically enough RAM." Both are more dangerous embedded because there's typically no OS-level protection (no segfault, no virtual memory) catching the corruption immediately — the failure surfaces later, somewhere unrelated, which is why static allocation and conservative, worst-case-sized stacks are the default discipline. See Lessons 1.4–1.5.</div>
      </details>
      <details class="qcard"><summary><span class="qnum">Q10.</span> Describe what happens, in order, from power-on to your <code>main()</code> function running.</summary>
        <div class="answer"><strong>Answer:</strong> The CPU reads the initial stack pointer and reset handler address directly from the fixed vector table at the start of flash. The reset handler (startup code) runs first: it copies the <code>.data</code> section's initial values from flash into RAM, zeroes out the <code>.bss</code> section, optionally initializes the clock tree, then calls <code>main()</code>. None of this requires an operating system — it's the minimal bootstrap every piece of bare-metal firmware goes through. See Lessons 2.4–2.5.</div>
      </details>
    </div>
  `},
  { id:'10-3', title:'System Design & Debugging Scenarios', body:`
    <p>Beyond isolated concept questions, expect at least one open-ended scenario per onsite loop. These reward a visible, structured approach more than a "correct" final answer — narrate your reasoning out loud.</p>
    <h4>Practice scenario: "Design the firmware for a system that reads a sensor every 10ms and reports it over UART."</h4>
    <p>A strong answer touches, roughly in this order: <strong>(1)</strong> what triggers the 10ms cadence — a hardware timer interrupt, not a delay loop, because delay loops drift and block other work (Lesson 5.3); <strong>(2)</strong> whether reading the sensor in the ISR itself is safe — if it's a quick register read, fine; if it's a slow SPI/I²C transaction, better to trigger it from the ISR and let DMA or a flagged main-loop task actually perform it, keeping the ISR itself fast (Lessons 2.6, 3.4); <strong>(3)</strong> how the sampled value gets handed to the UART-transmitting code safely — a shared <code>volatile</code> variable for a single value, or a queue if there's any chance of overlap (Lessons 1.4, 6.3); <strong>(4)</strong> what happens if the UART can't keep up with the sensor rate — buffer, drop oldest, or drop newest, and is that an acceptable tradeoff for this specific application; <strong>(5)</strong> what happens if the sensor itself fails or returns an implausible value — does the system have a defined fault state (Unit 8), or does it just transmit garbage forever.</p>
    <h4>Practice scenario: "The device runs fine for hours, then stops responding. How do you debug it?"</h4>
    <p>A structured approach beats guessing: <strong>(1)</strong> is the chip actually still running, or has it hard-faulted/hung? — check if a debugger can even attach, check if a watchdog reset is logged (Lessons 2.5, 8.1); <strong>(2)</strong> if it's still executing but unresponsive, suspect a deadlock (two tasks each waiting on a resource the other holds) or a stuck blocking call inside an ISR or high-priority task (Lessons 3.4, 6.4); <strong>(3)</strong> "after hours" specifically points toward something that accumulates — a slow memory leak (rare in static-allocation firmware, but possible with a queue that's never fully drained), heap fragmentation if dynamic allocation is in play, or a counter overflowing and wrapping into a code path that was never tested (Lessons 1.5, 7.1); <strong>(4)</strong> what instrumentation would catch this faster next time — a hard fault handler logging state to non-volatile memory before reset, or a periodic "still alive" heartbeat over UART/CAN that stops appearing right before the failure, narrowing the time window (Lesson 8.1).</p>
    <div class="callout"><div class="callout-label">The meta-skill being tested</div>Interviewers care more about the order and rigor of your hypotheses than about landing on the exact right answer immediately — "what happens if this assumption is wrong" (Lesson 1.1's closing idea, and a known instinct of yours already) is the single most reusable habit in this whole unit.</div>
  `},
  { id:'10-4', title:'Building a Portfolio That Proves You Can Do the Job', body:`
    <p>A resume bullet claiming familiarity with interrupts or RTOSes is far weaker than a project that visibly required understanding them — and every concept in this course maps to a project that can demonstrate it concretely.</p>
    <ul>
      <li><strong>Fuse at least two peripherals in one real project</strong> — a sensor read over I²C, processed, and reported over UART or CAN, is enough to demonstrate the full sense → decide → actuate loop from Lesson 1.1, and gives you a real story for the "walk me through a project" interview question.</li>
      <li><strong>Include something that broke, and how you found it.</strong> A project writeup or README that mentions "initially saw intermittent failures traced to a missing <code>volatile</code> on a shared ISR flag" is a far stronger signal than a project that "just worked" — it proves debugging skill, not just implementation skill, and lines up directly with the kind of scenario question from Lesson 10.3.</li>
      <li><strong>Keep firmware repos clean and reviewable.</strong> A clear README describing the hardware target, the build steps, and the architecture; commit history that tells a story rather than one giant "final code" commit; and code that's at least loosely organized around the HAL/abstraction pattern from Lesson 8.2 — all signal the workflow habits from Unit 9, not just raw coding ability.</li>
      <li><strong>Every claim should survive a follow-up question.</strong> If a bullet says "reduced integration errors by 50%," be ready to explain exactly what was measured and how — the same defensibility standard you've already been holding your resume work to elsewhere is exactly what a technical interviewer will probe on the spot.</li>
    </ul>
    <div class="callout violet"><div class="callout-label">Closing note</div>You now have, in one place, the same foundation-to-systems arc that the five resources you originally gathered would have taught across dozens of scattered hours — binary and registers, peripherals and protocols, concurrency and safety, and the language to talk about all of it precisely in an interview. The fastest way to make any of it permanent from here is still the same advice as before: build something, let it break, and find out why.</div>
  `},
] },
];

/* =========================================================
   STATE
========================================================= */
const STORAGE_KEY = 'bench-progress-v2';
let completed = {};
let currentLessonId = UNITS[0].lessons[0].id;
let collapsedUnits = {};

function flatLessons(){
  const out = [];
  UNITS.forEach(u => u.lessons.forEach(l => out.push({ unit:u, lesson:l })));
  return out;
}
async function loadProgress(){
  try{ const r = await window.storage.get(STORAGE_KEY, false); if(r && r.value) completed = JSON.parse(r.value); }
  catch(e){ completed = {}; }
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(completed), false); }catch(e){}
}

/* =========================================================
   SIDEBAR
========================================================= */
function renderSidebar(){
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  UNITS.forEach(unit => {
    const unitEl = document.createElement('div');
    unitEl.className = 'unit' + (collapsedUnits[unit.id] ? ' collapsed' : '');
    const head = document.createElement('div');
    head.className = 'unit-head';
    head.innerHTML = '<span>' + unit.title + '</span><span class="chev">▾</span>';
    head.addEventListener('click', () => { collapsedUnits[unit.id] = !collapsedUnits[unit.id]; renderSidebar(); });
    const lessonList = document.createElement('div');
    lessonList.className = 'lesson-list';
    unit.lessons.forEach(lesson => {
      const item = document.createElement('div');
      item.className = 'lesson-item' + (lesson.id === currentLessonId ? ' active' : '');
      const check = document.createElement('div');
      check.className = 'lesson-check' + (completed[lesson.id] ? ' done' : '');
      const label = document.createElement('span');
      label.textContent = lesson.title;
      item.appendChild(check); item.appendChild(label);
      item.addEventListener('click', () => {
        currentLessonId = lesson.id; renderAll();
        document.getElementById('sidebar').classList.remove('open');
        window.scrollTo({top:0, behavior:'smooth'});
      });
      lessonList.appendChild(item);
    });
    unitEl.appendChild(head); unitEl.appendChild(lessonList);
    list.appendChild(unitEl);
  });
  const all = flatLessons();
  const done = all.filter(x => completed[x.lesson.id]).length;
  const pct = all.length ? Math.round((done/all.length)*100) : 0;
  document.getElementById('progress-label').textContent = pct + '%  ·  ' + done + '/' + all.length;
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* =========================================================
   MAIN CONTENT
========================================================= */
function findLesson(id){
  for(const u of UNITS){ for(const l of u.lessons){ if(l.id===id) return {unit:u, lesson:l}; } }
  return null;
}
function renderContent(){
  const { unit, lesson } = findLesson(currentLessonId);
  const all = flatLessons();
  const idx = all.findIndex(x => x.lesson.id === currentLessonId);
  const prev = idx > 0 ? all[idx-1] : null;
  const next = idx < all.length-1 ? all[idx+1] : null;
  const wrap = document.getElementById('content');
  wrap.innerHTML = `
    <div class="crumb">${unit.title} <span>/</span> ${lesson.title}</div>
    <h2 class="lesson-title">${lesson.title}</h2>
    <button class="mark-done-btn ${completed[lesson.id] ? 'done' : ''}" id="mark-done">${completed[lesson.id] ? '✓ marked complete' : 'mark as complete'}</button>
    <div class="lesson-body">${lesson.body}</div>
    ${lesson.widget ? `<div class="widget" id="widget-mount"></div>` : ''}
    ${unit.quiz && lesson.id === unit.lessons[unit.lessons.length-1].id ? renderQuizHTML(unit) : ''}
    <div class="nav-footer">
      <button class="nav-btn" id="prev-btn" ${!prev?'disabled':''}>← ${prev ? prev.lesson.title : ''}</button>
      <button class="nav-btn" id="next-btn" ${!next?'disabled':''}>${next ? next.lesson.title : 'Course complete'} →</button>
    </div>
  `;
  document.getElementById('mark-done').addEventListener('click', () => {
    completed[lesson.id] = !completed[lesson.id]; saveProgress(); renderAll();
  });
  if(prev) document.getElementById('prev-btn').addEventListener('click', () => { currentLessonId = prev.lesson.id; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(next) document.getElementById('next-btn').addEventListener('click', () => { currentLessonId = next.lesson.id; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(lesson.widget && WIDGETS[lesson.widget]) WIDGETS[lesson.widget](document.getElementById('widget-mount'));
  if(unit.quiz && lesson.id === unit.lessons[unit.lessons.length-1].id) mountQuiz(unit);
}
function renderAll(){ renderSidebar(); renderContent(); }

/* =========================================================
   QUIZZES
========================================================= */

  ],

WIDGETS.uartSim = function(mount){

    path += 'L ' + (x+segW) + ' ' + yHigh + ' '; x += segW;

      const y = b ? yHigh : yLow;
      path += 'L ' + x + ' ' + y + ' L ' + (x+segW) + ' ' + y + ' ';
      let lbl = i===0 ? 'START' : (i===9 ? 'STOP' : 'D'+(i-1));
      labels += '<text x="'+(x+segW/2)+'" y="78" fill="#6d7782" font-family=\'JetBrains Mono, monospace\' font-size="9" text-anchor="middle">'+lbl+'</text>';

  charInput.addEventListener('input', render);
  baudSel.addEventListener('change', render);
  render();
};

WIDGETS.adcSim = function(mount){
  mount.innerHTML = `<div class="widget-head"><span>ADC sampling &amp; aliasing</span><span class="live"><span class="dot"></span>live</span></div>
    <div class="widget-body">
      <div class="row" style="margin-bottom:10px;"><label class="readout" style="flex:1;">signal frequency: <b id="adc-fhz">10</b> Hz<input type="range" id="adc-freq" min="2" max="30" value="10"></label></div>
      <div class="row" style="margin-bottom:14px;"><label class="readout" style="flex:1;">sample rate: <b id="adc-shz">60</b> Hz<input type="range" id="adc-rate" min="4" max="80" value="60"></label></div>
      <canvas id="adc-canvas" width="600" height="180" style="width:100%; height:auto; background:#0d1115; border-radius:6px; border:1px solid var(--border);"></canvas>
      <div class="readout" id="adc-readout" style="margin-top:10px;"></div>
    </div>`;
  const canvas = mount.querySelector('#adc-canvas');
  const ctx = canvas.getContext('2d');
  const freqSlider = mount.querySelector('#adc-freq');
  const rateSlider = mount.querySelector('#adc-rate');
  function draw(){
    const f = parseInt(freqSlider.value,10);
    const fs = parseInt(rateSlider.value,10);
    mount.querySelector('#adc-fhz').textContent = f;
    mount.querySelector('#adc-shz').textContent = fs;
    const w = canvas.width, h = canvas.height, mid = h/2, amp = h*0.38;
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();
    for(let x=0;x<w;x++){ const t = x/w; const y = mid - amp*Math.sin(2*Math.PI*f*t); if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.strokeStyle = 'rgba(170,179,189,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
    const pts = [];
    ctx.fillStyle = '#5eead4';
    for(let i=0;i<=fs;i++){
      const t = i/fs; if(t>1) break;
      const x = t*w; const y = mid - amp*Math.sin(2*Math.PI*f*t);
      pts.push([x,y]);
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.beginPath();
    pts.forEach((p,i) => { if(i===0) ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); });
    ctx.strokeStyle = '#ffb454'; ctx.lineWidth = 2; ctx.stroke();
    const nyquist = fs/2; const aliased = fs < 2*f;
    mount.querySelector('#adc-readout').innerHTML = 'Nyquist limit at this sample rate ≈ <b>'+nyquist.toFixed(1)+' Hz</b>. ' +
      (aliased ? '<b style="color:#ff6b6b;">Undersampled</b> — the reconstructed signal (amber) looks like a different, false frequency. This is aliasing.'
               : '<b style="color:#5eead4;">Sampled correctly</b> — sample rate is more than 2× the signal frequency, so the reconstruction (amber) tracks the true signal (gray).');
  }
  freqSlider.addEventListener('input', draw);
  rateSlider.addEventListener('input', draw);
  draw();
};

WIDGETS.canBusSim = function(mount){
  mount.innerHTML = `<div class="widget-head"><span>CAN bus arbitration</span><span class="live"><span class="dot"></span>live</span></div>
    <div class="widget-body">
      <div class="row" style="margin-bottom:16px;">
        <label class="readout">Node A ID (0-2047): <input type="number" id="can-a" value="340" min="0" max="2047" style="width:80px;"></label>
        <label class="readout">Node B ID (0-2047): <input type="number" id="can-b" value="85" min="0" max="2047" style="width:80px;"></label>
        <button class="btn primary" id="can-run">arbitrate</button>
      </div>
      <div id="can-rows"></div>
      <div class="readout" id="can-readout" style="margin-top:12px;"></div>
    </div>`;
  function toBits(n){ return n.toString(2).padStart(11,'0').split('').map(Number); }
  function render(){
    const a = Math.min(2047, Math.max(0, parseInt(mount.querySelector('#can-a').value,10)||0));
    const b = Math.min(2047, Math.max(0, parseInt(mount.querySelector('#can-b').value,10)||0));
    const ab = toBits(a), bb = toBits(b);
    let loseAt = -1;
    for(let i=0;i<11;i++){ if(ab[i] !== bb[i]){ loseAt = i; break; } }
    function rowHTML(label, bits, loserIsThis){
      let cells = '';
      bits.forEach((bit, i) => {
        let cls = 'bit small';
        if(loseAt !== -1 && i === loseAt && loserIsThis) cls += '';
        cells += '<div class="'+cls+'" style="' +
          (loseAt !== -1 && i === loseAt && loserIsThis ? 'border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.12);' :
           loseAt !== -1 && i > loseAt && loserIsThis ? 'opacity:0.25;' : '') + '">' + bit + '</div>';
      });
      return '<div class="readout" style="margin-bottom:4px;">'+label+'</div><div class="bitgrid" style="margin-bottom:14px;">'+cells+'</div>';
    }
    const rows = mount.querySelector('#can-rows');
    rows.innerHTML = rowHTML('Node A — ID '+a, ab, true) + rowHTML('Node B — ID '+b, bb, false);
    // figure out which one actually loses (the one with a 1/recessive at the differing bit)
    let readout;
    if(a === b){
      readout = 'Both nodes chose the same ID — not valid on a real CAN bus (IDs must be unique). No arbitration to resolve.';
    } else {
      const loserIsA = ab[loseAt] === 1; // 1 = recessive = loses to a 0 = dominant
      const winner = loserIsA ? 'Node B (ID '+b+')' : 'Node A (ID '+a+')';
      const loser = loserIsA ? 'Node A (ID '+a+')' : 'Node B (ID '+b+')';
      readout = 'Both started transmitting at once. At bit position '+(loseAt+1)+' of the identifier, the two disagree — one transmits recessive (1), the other dominant (0). The dominant bit wins the bus. <b style="color:var(--cyan)">'+winner+' continues transmitting uninterrupted.</b> <b style="color:#ff6b6b;">'+loser+' detects the mismatch and silently backs off</b>, retrying once the bus is free again. Lower numeric ID won — exactly as CAN priority is designed to work.';
    }
    mount.querySelector('#can-readout').innerHTML = readout;
  }
  mount.querySelector('#can-run').addEventListener('click', render);
  mount.querySelector('#can-a').addEventListener('input', render);
  mount.querySelector('#can-b').addEventListener('input', render);
  render();
};

WIDGETS.watchdogSim = function(mount){
  const TOTAL = 3000;
  let remaining = TOTAL;
  let resets = 0, kicks = 0;
  let timer = null;
  mount.innerHTML = `<div class="widget-head"><span>Watchdog timer</span><span class="live"><span class="dot"></span>live</span></div>
    <div class="widget-body">
      <div class="row" style="margin-bottom:14px;">
        <button class="btn primary" id="wd-kick">kick the watchdog</button>
        <div class="readout">kicks: <b id="wd-kicks">0</b> &nbsp;·&nbsp; resets triggered: <b id="wd-resets">0</b></div>
      </div>
      <div style="height:18px; background:#0d1115; border:1px solid var(--border); border-radius:9px; overflow:hidden;">
        <div id="wd-bar" style="height:100%; width:100%; background:linear-gradient(90deg,#5eead4,#ffb454); transition:width .1s linear;"></div>
      </div>
      <div class="readout" id="wd-readout" style="margin-top:12px;">Healthy firmware kicks the dog regularly. Stop clicking to simulate a hang — watch what happens when the bar hits zero.</div>
    </div>`;
  const bar = mount.querySelector('#wd-bar');
  const readout = mount.querySelector('#wd-readout');
  function tick(){
    remaining -= 80;
    if(remaining <= 0){
      resets++;
      mount.querySelector('#wd-resets').textContent = resets;
      bar.style.background = '#ff6b6b';
      readout.innerHTML = '<b style="color:#ff6b6b;">⚠ Watchdog expired — firmware never kicked it in time. MCU forces a reset.</b> After reset, the watchdog reloads automatically.';
      remaining = TOTAL;
      setTimeout(() => { bar.style.background = 'linear-gradient(90deg,#5eead4,#ffb454)'; }, 600);
    }
    bar.style.width = Math.max(0, (remaining/TOTAL)*100) + '%';
  }
  timer = setInterval(tick, 80);
  mount.querySelector('#wd-kick').addEventListener('click', () => {
    kicks++; mount.querySelector('#wd-kicks').textContent = kicks;
    remaining = TOTAL;
    readout.textContent = 'Kicked — timer reset to full. This is what a healthy main loop does every pass.';
  });
};

   INIT
========================================================= */
(async function init(){
  await loadProgress();
  renderAll();
})();
